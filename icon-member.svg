<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient (green) -->
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D2E20"/>
      <stop offset="100%" stop-color="#3D9970"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#gbg)"/>

  <!-- Pilates pose: person lying, legs raised (Hundred position) -->
  <!-- Head -->
  <circle cx="148" cy="248" r="50" fill="white" opacity="0.95"/>
  <!-- Body (horizontal) -->
  <rect x="186" y="232" width="200" height="40" rx="20" fill="white" opacity="0.95"/>
  <!-- Left leg raised at 45° -->
  <rect x="342" y="105" width="40" height="148" rx="20" fill="white" opacity="0.95"
        transform="rotate(45 362 179)"/>
  <!-- Right leg raised at 45° (slightly apart) -->
  <rect x="370" y="118" width="40" height="148" rx="20" fill="white" opacity="0.9"
        transform="rotate(40 390 192)"/>
  <!-- Arms extended forward -->
  <rect x="186" y="200" width="130" height="26" rx="13" fill="white" opacity="0.85"
        transform="rotate(-12 251 213)"/>
  <rect x="186" y="286" width="130" height="26" rx="13" fill="white" opacity="0.85"
        transform="rotate(12 251 299)"/>

  <!-- Heart badge (회원 상징) -->
  <g transform="translate(390,100)">
    <circle r="56" fill="white" opacity="0.2"/>
    <circle r="46" fill="white"/>
    <!-- Heart path -->
    <path d="M0,18 C0,18 -32,-8 -32,-28 C-32,-46 -16,-52 0,-38 C16,-52 32,-46 32,-28 C32,-8 0,18 0,18 Z"
          fill="#D9634E"/>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="440" width="512" height="72" fill="rgba(255,255,255,0.12)"/>
  <text x="256" y="488" font-family="'Noto Sans KR',Arial,sans-serif" font-size="40" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">회원 앱</text>
</svg>
