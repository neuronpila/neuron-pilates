<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1A5C3A">
<title>뉴런필라테스 강사</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--g:#1A5C3A;--g2:#2A7A5A;--gl:#7ECBA0;--gp:#E8F5EE;--stone:#2E2E2B;--mid:#6B6B68;--cream:#F7F5F1;--white:#FDFCFA;--gold:#C4A055;--red:#D9634E;--blue:#5B8DB8;--shadow:rgba(26,92,58,0.12);--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--stone);min-height:100vh;max-width:430px;margin:0 auto;}
.hdr{background:linear-gradient(135deg,var(--stone),#3A3A37);color:white;padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-logo{width:30px;height:30px;object-fit:contain;}
.hdr-t{font-size:15px;font-weight:700;}
.hdr-s{font-size:10px;color:var(--gl);margin-top:1px;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid rgba(0,0,0,0.08);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--mid);transition:color 0.2s;font-size:9px;font-weight:500;}
.nb.active{color:var(--g2);}
.ni{font-size:19px;}
.content{padding:0 0 80px;}
.panel{display:none;}
.panel.active{display:block;}
.strip{background:linear-gradient(135deg,var(--g),var(--g2));color:white;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
.sec{padding:14px 14px 0;}
.sec-t{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.sec-t span{font-size:11px;color:var(--g2);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.stat-c{background:var(--white);border-radius:var(--r);padding:12px 8px;text-align:center;box-shadow:0 2px 10px var(--shadow);}
.stat-n{font-size:26px;font-weight:700;line-height:1;}
.stat-l{font-size:10px;color:var(--mid);margin-top:3px;}
.card{background:var(--white);border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 10px var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform 0.15s;margin-bottom:10px;}
.card:active{transform:scale(0.98);}
.ct{min-width:48px;text-align:center;background:var(--gp);border-radius:10px;padding:7px 4px;}
.ct-t{font-size:13px;font-weight:700;color:var(--g2);}
.ct-s{font-size:10px;color:var(--gl);}
.ci{flex:1;}
.cn{font-size:14px;font-weight:600;}
.cd{font-size:11px;color:var(--mid);margin-top:2px;}
.mc{background:var(--white);border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 8px var(--shadow);display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--gp),var(--gl));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--g);flex-shrink:0;}
.mi{flex:1;}
.mn{font-size:14px;font-weight:600;}
.md{font-size:11px;color:var(--mid);margin-top:2px;}
/* 레슨 횟수 뱃지 */
.lesson-badge{display:flex;gap:6px;margin-top:4px;}
.lb{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;}
.lb-total{background:#E8EEF8;color:var(--blue);}
.lb-used{background:var(--gp);color:var(--g2);}
.lb-remain{background:#FFF3E0;color:#D07030;}
/* 출석 */
.att-sel{background:var(--white);margin:14px;border-radius:var(--r);padding:4px;display:flex;gap:4px;box-shadow:0 2px 8px var(--shadow);flex-wrap:wrap;}
.asb{flex:1;min-width:70px;padding:7px 4px;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s;background:transparent;color:var(--mid);}
.asb.active{background:var(--g2);color:white;}
.att-row{background:var(--white);border-radius:var(--r);padding:12px 14px;box-shadow:0 2px 8px var(--shadow);display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.att-btns{display:flex;gap:5px;}
.ab{padding:6px 12px;border-radius:20px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.ab-o{background:var(--g2);color:white;}
.ab-x{background:#FDECEA;color:var(--red);}
.ab-off{background:var(--cream);color:var(--mid);}
/* 피드백 */
.fb-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 8px var(--shadow);cursor:pointer;margin-bottom:8px;}
.fb-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.fb-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gp),var(--gl));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--g);flex-shrink:0;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.chip{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:500;}
.cg{background:var(--gp);color:var(--g2);}
.cb{background:#E8EEF8;color:var(--blue);}
.new-badge{font-size:10px;background:var(--red);color:white;padding:2px 7px;border-radius:10px;}
/* 식단 */
.diet-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 8px var(--shadow);margin-bottom:10px;}
.diet-img{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:10px;background:var(--cream);}
.diet-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
/* 칼럼 */
.col-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;cursor:pointer;}
.col-tag{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:600;background:var(--gp);color:var(--g2);margin-bottom:8px;}
.col-title{font-size:15px;font-weight:700;margin-bottom:6px;}
.col-preview{font-size:12px;color:var(--mid);line-height:1.6;}
/* 근육 */
.muscle-wrap{display:flex;gap:14px;justify-content:center;margin-bottom:16px;}
.body-svg{width:130px;}
/* 폼 */
.fg{margin-bottom:12px;}
.fl{font-size:11px;font-weight:600;color:var(--mid);margin-bottom:5px;display:block;}
.fi{width:100%;padding:11px 13px;border:1.5px solid rgba(0,0,0,0.10);border-radius:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--stone);transition:border-color 0.2s;}
.fi:focus{outline:none;border-color:var(--g2);}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-f{width:100%;padding:13px;background:var(--g2);color:white;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-o{width:100%;padding:11px;background:transparent;color:var(--g2);border:1.5px solid var(--g2);border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.fab{position:fixed;bottom:88px;right:16px;width:50px;height:50px;border-radius:50%;background:var(--g2);color:white;border:none;font-size:22px;box-shadow:0 4px 16px rgba(42,122,90,0.5);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:90;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:22px 18px 44px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;}
.mh{width:38px;height:4px;border-radius:2px;background:rgba(0,0,0,0.15);margin:0 auto 18px;}
.mt{font-size:17px;font-weight:700;margin-bottom:14px;}
.cond-row{display:flex;gap:6px;margin-bottom:12px;}
.cond-btn{flex:1;padding:9px 4px;border:1.5px solid rgba(0,0,0,0.10);border-radius:12px;background:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;text-align:center;transition:all 0.2s;color:var(--mid);}
.cond-btn.active{border-color:var(--g2);background:var(--gp);color:var(--g2);font-weight:700;}
.bpg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.bp{padding:9px 4px;border:1.5px solid rgba(0,0,0,0.10);border-radius:10px;background:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:11px;cursor:pointer;text-align:center;color:var(--mid);}
.bp.active{border-color:var(--g2);background:var(--gp);color:var(--g2);font-weight:700;}
.stars{display:flex;gap:5px;margin-bottom:12px;}
.star{font-size:26px;cursor:pointer;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--stone);color:white;padding:11px 18px;border-radius:12px;font-size:12px;white-space:nowrap;opacity:0;transition:all 0.25s;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.loading{text-align:center;padding:30px;color:var(--mid);font-size:13px;}
.empty{text-align:center;padding:32px 16px;color:var(--mid);}
.empty-i{font-size:40px;margin-bottom:8px;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l">
    <img class="hdr-logo" src="logo.png" alt="">
    <div><div class="hdr-t">뉴런필라테스 강사</div><div class="hdr-s" id="hdrDate"></div></div>
  </div>
  <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#2A7A5A,#C4A055);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;" id="instrAvatar">Yang</div>
</div>

<div class="content">
  <!-- 홈 -->
  <div class="panel active" id="p-home">
    <div class="strip">
      <div><div style="font-size:12px;opacity:0.8;" id="todayStr"></div><div style="font-size:16px;font-weight:700;margin-top:2px;">오늘 수업 <span id="todayCnt">0</span>개</div></div>
      <div style="text-align:right;"><div style="font-size:11px;opacity:0.75;">다음 수업</div><div style="font-size:14px;font-weight:700;" id="nextCls">-</div></div>
    </div>
    <div class="sec">
      <div class="stat-row">
        <div class="stat-c"><div class="stat-n" id="sMbr">0</div><div class="stat-l">전체 회원</div></div>
        <div class="stat-c"><div class="stat-n" id="sAtt">0</div><div class="stat-l">오늘 출석</div></div>
        <div class="stat-c"><div class="stat-n" id="sFb">0</div><div class="stat-l">미작성 피드백</div></div>
      </div>
      <div class="sec-t">오늘 수업 <span onclick="switchTab('schedule')">전체</span></div>
      <div id="todayClsList"></div>
      <div class="sec-t" style="margin-top:4px;">식단 대기 <span onclick="switchTab('diet')">전체</span></div>
      <div id="dietPending"></div>
    </div>
  </div>

  <!-- 회원 -->
  <div class="panel" id="p-members">
    <div style="padding:14px 14px 0;">
      <input class="fi" type="search" placeholder="🔍 회원 검색..." id="mSearch" oninput="renderMembers(this.value)" style="margin-bottom:10px;">
    </div>
    <div class="sec">
      <div class="sec-t">전체 회원 <span id="mCntLbl"></span></div>
      <div id="memberListEl"></div>
    </div>
  </div>

  <!-- 출석 -->
  <div class="panel" id="p-att">
    <div class="att-sel" id="attSel"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:0 14px 10px;">
      <span style="font-size:11px;color:var(--mid);" id="attSum"></span>
      <button class="ab ab-o" style="font-size:10px;padding:5px 10px;" onclick="markAll()">전체 출석</button>
    </div>
    <div style="padding:0 14px;" id="attList"></div>
  </div>

  <!-- 피드백 -->
  <div class="panel" id="p-fb">
    <div class="sec">
      <div class="sec-t">오늘 피드백</div>
      <div id="fbList"></div>
    </div>
  </div>

  <!-- 식단관리 -->
  <div class="panel" id="p-diet">
    <div class="sec">
      <div class="sec-t">회원 식단 사진</div>
      <div id="dietList"></div>
    </div>
  </div>

  <!-- 운동 지식 칼럼 -->
  <div class="panel" id="p-column">
    <div class="sec">
      <div class="sec-t">운동 지식 칼럼 <span onclick="openModal('addColModal')">+ 추가</span></div>
      <div id="columnList"></div>
    </div>
  </div>

  <!-- 일정 -->
  <div class="panel" id="p-schedule">
    <div class="sec">
      <div class="sec-t">수업 일정</div>
      <div id="schedList"></div>
    </div>
    <div style="padding:14px;"><button class="btn-f" onclick="openModal('addClsModal')">+ 수업 추가</button></div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="onFab()" style="display:none;">+</button>

<nav class="bnav">
  <button class="nb active" onclick="switchTab('home')" id="t-home"><span class="ni">🏠</span>홈</button>
  <button class="nb" onclick="switchTab('members')" id="t-members"><span class="ni">👥</span>회원</button>
  <button class="nb" onclick="switchTab('att')" id="t-att"><span class="ni">✅</span>출석</button>
  <button class="nb" onclick="switchTab('fb')" id="t-fb"><span class="ni">💬</span>피드백</button>
  <button class="nb" onclick="switchTab('diet')" id="t-diet"><span class="ni">🥗</span>식단</button>
  <button class="nb" onclick="switchTab('column')" id="t-column"><span class="ni">📖</span>칼럼</button>
  <button class="nb" onclick="switchTab('schedule')" id="t-schedule"><span class="ni">📅</span>일정</button>
</nav>

<!-- 회원 수정 -->
<div class="modal-ov" id="editMbrModal">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt">회원 수정</div>
    <input type="hidden" id="editMbrId">
    <div class="fr">
      <div class="fg"><label class="fl">이름</label><input class="fi" id="eN" placeholder="홍길동"></div>
      <div class="fg"><label class="fl">연락처</label><input class="fi" id="eP" placeholder="010-0000-0000" type="tel"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">수강 클래스</label>
        <select class="fi" id="eC"><option>기초 필라테스</option><option>코어 강화</option><option>바디밸런스</option><option>저녁 플로우</option></select>
      </div>
      <div class="fg"><label class="fl">등록일</label><input class="fi" id="eD" type="date"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">총 레슨 횟수</label><input class="fi" id="eLT" type="number" placeholder="10" min="1"></div>
      <div class="fg"><label class="fl">이용 횟수</label><input class="fi" id="eLU" type="number" placeholder="0" min="0"></div>
    </div>
    <div class="fg"><label class="fl">특이사항</label><textarea class="fi" id="eNote" rows="2" placeholder="허리 디스크, 무릎 약함 등"></textarea></div>
    <button class="btn-f" onclick="saveEditMbr()">수정 저장</button>
    <button class="btn-o" onclick="closeModal('editMbrModal')">취소</button>
  </div>
</div>

<!-- 회원 추가 -->
<div class="modal-ov" id="addMbrModal">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt">회원 추가</div>
    <div class="fr">
      <div class="fg"><label class="fl">이름</label><input class="fi" id="nN" placeholder="홍길동"></div>
      <div class="fg"><label class="fl">연락처</label><input class="fi" id="nP" placeholder="010-0000-0000" type="tel"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">수강 클래스</label>
        <select class="fi" id="nC"><option>기초 필라테스</option><option>코어 강화</option><option>바디밸런스</option><option>저녁 플로우</option></select>
      </div>
      <div class="fg"><label class="fl">등록일</label><input class="fi" id="nD" type="date"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">총 레슨 횟수</label><input class="fi" id="nLT" type="number" placeholder="10" min="1"></div>
      <div class="fg"><label class="fl">이용 횟수</label><input class="fi" id="nLU" type="number" placeholder="0" min="0"></div>
    </div>
    <div class="fg"><label class="fl">특이사항</label><textarea class="fi" id="nNote" rows="2" placeholder="허리 디스크, 무릎 약함 등"></textarea></div>
    <button class="btn-f" onclick="addMember()">회원 등록</button>
    <button class="btn-o" onclick="closeModal('addMbrModal')">취소</button>
  </div>
</div>

<!-- 회원 상세 -->
<div class="modal-ov" id="mbrDetailModal">
  <div class="modal"><div class="mh"></div><div id="mbrDetailContent"></div><button class="btn-o" onclick="closeModal('mbrDetailModal')">닫기</button></div>
</div>

<!-- 피드백 작성 -->
<div class="modal-ov" id="fbModal">
  <div class="modal">
    <div class="mh"></div>
    <div class="mt" id="fbModalTitle">피드백 작성</div>
    <div class="fg"><label class="fl">컨디션</label>
      <div class="cond-row">
        <button class="cond-btn" onclick="selCond(this,'😄 좋음')">😄 좋음</button>
        <button class="cond-btn" onclick="selCond(this,'😐 보통')">😐 보통</button>
        <button class="cond-btn" onclick="selCond(this,'😔 피로')">😔 피로</button>
      </div>
    </div>
    <div class="fg"><label class="fl">신체 부위 피드백</label>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:8px;">
        <div style="text-align:center;">
          <div style="font-size:10px;color:var(--mid);margin-bottom:4px;">앞면</div>
          <svg width="110" height="230" viewBox="0 0 110 230" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="55" cy="18" rx="18" ry="18" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5"/>
            <rect x="32" y="44" width="46" height="60" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-chest" class="fb-muscle-part" data-key="chest" data-label="가슴·흉근" style="cursor:pointer;"/>
            <rect x="35" y="100" width="40" height="40" rx="6" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-core" class="fb-muscle-part" data-key="core" data-label="코어·복근" style="cursor:pointer;"/>
            <rect x="10" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-arm-l" class="fb-muscle-part" data-key="arm" data-label="팔·어깨" style="cursor:pointer;"/>
            <rect x="80" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-arm-r" class="fb-muscle-part" data-key="arm" data-label="팔·어깨" style="cursor:pointer;"/>
            <rect x="33" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-leg-l" class="fb-muscle-part" data-key="leg" data-label="다리" style="cursor:pointer;"/>
            <rect x="57" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="fi-leg-r" class="fb-muscle-part" data-key="leg" data-label="다리" style="cursor:pointer;"/>
          </svg>
        </div>
        <div style="text-align:center;">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

const firebaseConfig = {

  authDomain: "neuron-pilates.firebaseapp.com",
  projectId: "neuron-pilates",
  storageBucket: "neuron-pilates.firebasestorage.app",

const DAY=['일','월','화','수','목','금','토'];

function switchTab(t) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('t-'+t).classList.add('active');
  currentTab=t;
  document.getElementById('fabBtn').style.display=(t==='members'||t==='schedule'||t==='column')?'flex':'none';
  if(t==='home')renderHome();
  else if(t==='members')renderMembers('');
  else if(t==='att')renderAtt();
  else if(t==='fb')renderFb();
  else if(t==='diet')renderDiet();
  else if(t==='column')renderColumns();
  else if(t==='schedule')renderSchedule();
}

function onFab(){
  if(currentTab==='members')openModal('addMbrModal');
  else if(currentTab==='schedule')openModal('addClsModal');
  else if(currentTab==='column')openModal('addColModal');
}

// ── HOME ──
async function renderHome() {
  const [mSnap, clsSnap] = await Promise.all([
    getDocs(collection(db,'members')),
    getDocs(collection(db,'classes'))
  ]);
  const members = mSnap.docs.map(d=>({id:d.id,...d.data()}));
  const classes = clsSnap.docs.map(d=>({id:d.id,...d.data()}));
  const tClasses = classes.filter(c=>c.day===todayDay);
  document.getElementById('todayCnt').textContent = tClasses.length;
  document.getElementById('sMbr').textContent = members.length;

  const attSnap = await getDocs(query(collection(db,'attendance'), where('date','==',todayKey)));
  const presentCount = attSnap.docs.filter(d=>d.data().status==='present').length;
  document.getElementById('sAtt').textContent = presentCount;

  const fbSnap = await getDocs(query(collection(db,'feedbacks'), where('date','==',todayKey)));
  const fbDone = fbSnap.docs.map(d=>d.data().memberId);
  document.getElementById('sFb').textContent = members.filter(m=>!fbDone.includes(m.id)).length;

  const now = today.toTimeString().slice(0,5);
  const next = tClasses.find(c=>c.time>=now);
  document.getElementById('nextCls').textContent = next ? next.time+' '+next.name : '없음';

  document.getElementById('todayClsList').innerHTML = tClasses.length ? tClasses.map(c=>`
    <div class="card" onclick="switchTab('att')">
      <div class="ct"><div class="ct-t">${c.time}</div><div class="ct-s">${c.level||''}</div></div>
      <div class="ci"><div class="cn">${c.name}</div><div class="cd">최대 ${c.max}명 · ${c.day}요일</div></div>
    </div>`).join('') : '<div class="empty"><div class="empty-i">📭</div><div style="font-size:13px;color:var(--mid);">오늘 수업 없음</div></div>';

  // 식단 대기
  const dietSnap = await getDocs(query(collection(db,'diets'), where('status','==','pending')));
  document.getElementById('dietPending').innerHTML = dietSnap.empty ? '<div style="font-size:12px;color:var(--mid);padding:8px 0;">대기 중인 식단 없음</div>' :
    dietSnap.docs.slice(0,2).map(d=>{
      const dt=d.data();
      return`<div class="fb-card" onclick="openDietCmt('${d.id}','${dt.memberName}','${dt.imageUrl||''}')">
        <div class="fb-hdr"><div class="fb-av">${dt.memberName[0]}</div>
        <div><div style="font-size:13px;font-weight:600;">${dt.memberName}</div><div style="font-size:11px;color:var(--mid);">${dt.date} · 코멘트 대기중</div></div>
        <span class="new-badge">대기</span></div>
      </div>`;
    }).join('');
}

// ── MEMBERS ──
async function renderMembers(q='') {
  const snap = await getDocs(collection(db,'members'));
  const all = snap.docs.map(d=>({id:d.id,...d.data()})).filter(m=>m.name.includes(q));
  document.getElementById('mCntLbl').textContent = all.length+'명';
  const container = document.getElementById('memberListEl');
  if(!all.length){container.innerHTML='<div class="empty"><div class="empty-i">🔍</div><div style="font-size:13px;">검색 결과 없음</div></div>';return;}
  container.innerHTML='';
  all.forEach(m=>{
    const remain=(m.lessonTotal||0)-(m.lessonUsed||0);
    const card=document.createElement('div');
    card.className='mc';
    card.style.cursor='pointer';
    card.innerHTML=`
      <div class="av">${m.name[0]}</div>
      <div class="mi">
        <div class="mn">${m.name}</div>
        <div class="md">${m.class}</div>
        <div class="lesson-badge">
          <span class="lb lb-total">총 ${m.lessonTotal||0}회</span>
          <span class="lb lb-used">이용 ${m.lessonUsed||0}회</span>
          <span class="lb lb-remain">잔여 ${remain}회</span>
        </div>
        ${m.note?`<div style="font-size:10px;color:var(--red);margin-top:3px;">⚠ ${m.note}</div>`:''}
      </div>`;
    card.addEventListener('click', ()=>openMbrDetail(m.id));
    container.appendChild(card);
  });
}

async function openMbrDetail(id) {
  const snap = await getDoc(doc(db,'members',id));
  const m = {id,...snap.data()};
  const fbSnap = await getDocs(query(collection(db,'feedbacks'), where('memberId','==',id)));
  const fbs = fbSnap.docs.slice(0,3).map(d=>d.data());
  const remain = (m.lessonTotal||0)-(m.lessonUsed||0);

  const fbHtml = fbs.length ? fbs.map(fb=>`
    <div style="background:var(--cream);border-radius:12px;padding:11px;margin-bottom:7px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:12px;font-weight:600;">${fb.condition||''} ${'⭐'.repeat(fb.rating||0)}</span>
        <span style="font-size:10px;color:var(--mid);">${fb.date}</span>
      </div>
      <div style="font-size:12px;line-height:1.6;">${fb.note||''}</div>
      ${fb.next?`<div style="font-size:11px;color:var(--g2);margin-top:4px;">→ ${fb.next}</div>`:''}
    </div>`).join('') : '<div style="font-size:12px;color:var(--mid);">피드백 없음</div>';

  const container = document.getElementById('mbrDetailContent');
  container.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <div class="av" style="width:52px;height:52px;font-size:18px;">${m.name[0]}</div>
      <div><div style="font-size:19px;font-weight:700;">${m.name}</div>
        <div style="font-size:12px;color:var(--mid);">${m.class} · ${m.phone||''}</div>
        ${m.note?`<div style="font-size:11px;color:var(--red);margin-top:2px;">⚠ ${m.note}</div>`:''}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;">
      <div class="stat-c"><div class="stat-n" style="font-size:20px;">${m.lessonTotal||0}</div><div class="stat-l">총 횟수</div></div>
      <div class="stat-c"><div class="stat-n" style="font-size:20px;">${m.lessonUsed||0}</div><div class="stat-l">이용</div></div>
      <div class="stat-c"><div class="stat-n" style="font-size:20px;color:${remain<=2?'var(--red)':'var(--g2)'};">${remain}</div><div class="stat-l">잔여</div></div>
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:8px;">최근 피드백</div>
    ${fbHtml}
    <button id="detailFbBtn" class="btn-f" style="margin-top:10px;">피드백 작성</button>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button id="detailEditBtn" style="flex:1;padding:11px;background:transparent;color:var(--g2);border:1.5px solid var(--g2);border-radius:14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">회원 수정</button>
      <button id="detailDelBtn" style="flex:1;padding:11px;background:transparent;color:var(--red);border:1.5px solid var(--red);border-radius:14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;">회원 삭제</button>
    </div>`;

  document.getElementById('detailFbBtn').addEventListener('click',()=>{closeModal('mbrDetailModal');openFbModal(id,m.name);});
  document.getElementById('detailEditBtn').addEventListener('click',()=>{closeModal('mbrDetailModal');openEditMbr(id);});
  document.getElementById('detailDelBtn').addEventListener('click',()=>deleteMember(id,m.name));

  openModal('mbrDetailModal');
}

async function addMember() {
  const name = document.getElementById('nN').value.trim();
  if(!name){showToast('이름을 입력하세요');return;}
  const newDoc = doc(collection(db,'members'));
  await setDoc(newDoc, {
    name, phone: document.getElementById('nP').value,
    class: document.getElementById('nC').value,
    date: document.getElementById('nD').value || todayKey,
    lessonTotal: parseInt(document.getElementById('nLT').value)||0,
    lessonUsed: parseInt(document.getElementById('nLU').value)||0,
    note: document.getElementById('nNote').value,
    createdAt: todayKey
  });
  closeModal('addMbrModal');
  renderMembers('');
  showToast(name+' 회원 등록 완료 ✓');
  ['nN','nP','nNote'].forEach(id=>document.getElementById(id).value='');
}

async function openEditMbr(id) {
  const snap = await getDoc(doc(db,'members',id));
  const m = snap.data();
  document.getElementById('editMbrId').value = id;
  document.getElementById('eN').value = m.name || '';
  document.getElementById('eP').value = m.phone || '';
  document.getElementById('eD').value = m.date || '';
  document.getElementById('eLT').value = m.lessonTotal || '';
  document.getElementById('eLU').value = m.lessonUsed || '';
  document.getElementById('eNote').value = m.note || '';
  // 클래스 선택 맞추기
  const eC = document.getElementById('eC');
  for(let i=0;i<eC.options.length;i++){
    if(eC.options[i].value===m.class){eC.selectedIndex=i;break;}
  }
  openModal('editMbrModal');
}

async function saveEditMbr() {
  const id = document.getElementById('editMbrId').value;
  const name = document.getElementById('eN').value.trim();
  if(!name){showToast('이름을 입력하세요');return;}
  await updateDoc(doc(db,'members',id), {
    name,
    phone: document.getElementById('eP').value,
    class: document.getElementById('eC').value,
    date: document.getElementById('eD').value,
    lessonTotal: parseInt(document.getElementById('eLT').value)||0,
    lessonUsed: parseInt(document.getElementById('eLU').value)||0,
    note: document.getElementById('eNote').value,
  });
  closeModal('editMbrModal');
  renderMembers('');
  showToast(name+' 회원 정보 수정 완료 ✓');
}

async function deleteMember(id, name) {
  if(!confirm(name+' 회원을 삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'members',id));
  closeModal('mbrDetailModal');
  renderMembers('');
  showToast('삭제 완료');
}

// ── ATTENDANCE ──
async function renderAtt() {
  const snap = await getDocs(collection(db,'classes'));
  const classes = snap.docs.map(d=>({id:d.id,...d.data()})).filter(c=>c.day===todayDay);
  document.getElementById('attSel').innerHTML = classes.length ?
    classes.map((c,i)=>`<button class="asb ${i===attIdx?'active':''}" onclick="selAttClass(${i})">${c.name}</button>`).join('') :
    '<span style="font-size:11px;color:var(--mid);padding:8px;">오늘 수업 없음</span>';
  await renderAttList(classes[attIdx]);
}

window.selAttClass = async function(i) { attIdx=i; await renderAtt(); }

async function renderAttList(cls) {
  if(!cls){document.getElementById('attList').innerHTML='';document.getElementById('attSum').textContent='';return;}
  const mSnap = await getDocs(query(collection(db,'members'), where('class','==',cls.name)));
  const members = mSnap.docs.map(d=>({id:d.id,...d.data()}));
  const attSnap = await getDocs(query(collection(db,'attendance'), where('date','==',todayKey), where('classId','==',cls.id)));
  const attMap = {};
  attSnap.docs.forEach(d=>{const dt=d.data();attMap[dt.memberId]=dt.status;});
  const pc = members.filter(m=>attMap[m.id]==='present').length;
  document.getElementById('attSum').textContent = `${cls.name} · ${pc}/${members.length}명 출석`;
  document.getElementById('attList').innerHTML = members.map(m=>`
    <div class="att-row">
      <div class="av" style="width:38px;height:38px;font-size:13px;">${m.name[0]}</div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${m.name}</div><div style="font-size:10px;color:var(--mid);">잔여 ${(m.lessonTotal||0)-(m.lessonUsed||0)}회</div></div>
      <div class="att-btns">
        <button class="ab ${attMap[m.id]==='present'?'ab-o':'ab-off'}" onclick="setAtt('${m.id}','${cls.id}','present')">출석</button>
        <button class="ab ${attMap[m.id]==='absent'?'ab-x':'ab-off'}" onclick="setAtt('${m.id}','${cls.id}','absent')">결석</button>
      </div>
    </div>`).join('') || '<div class="empty"><div class="empty-i">👥</div><div style="font-size:13px;">등록된 회원 없음</div></div>';
}

window.setAtt = async function(mId, clsId, status) {
  const attId = `${todayKey}_${mId}_${clsId}`;
  await setDoc(doc(db,'attendance',attId), {memberId:mId, classId:clsId, date:todayKey, status});
  const snap = await getDocs(collection(db,'classes'));
  const classes = snap.docs.map(d=>({id:d.id,...d.data()})).filter(c=>c.day===todayDay);
  await renderAttList(classes[attIdx]);
  showToast(status==='present'?'출석 처리 ✓':'결석 처리');
}

async function markAll() {
  const snap = await getDocs(collection(db,'classes'));
  const classes = snap.docs.map(d=>({id:d.id,...d.data()})).filter(c=>c.day===todayDay);
  const cls = classes[attIdx]; if(!cls)return;
  const mSnap = await getDocs(query(collection(db,'members'), where('class','==',cls.name)));
  const members = mSnap.docs.map(d=>d.id);
  await Promise.all(members.map(mId => setDoc(doc(db,'attendance',`${todayKey}_${mId}_${cls.id}`), {memberId:mId,classId:cls.id,date:todayKey,status:'present'})));
  await renderAttList(cls);
  showToast('전원 출석 처리 완료 ✓');
}

// ── FEEDBACK ──
async function renderFb() {
  const [mSnap, fbSnap] = await Promise.all([
    getDocs(collection(db,'members')),
    getDocs(query(collection(db,'feedbacks'), where('date','==',todayKey)))
  ]);
  const members = mSnap.docs.map(d=>({id:d.id,...d.data()}));
  const fbDone = {};
  fbSnap.docs.forEach(d=>{const dt=d.data();fbDone[dt.memberId]=dt;});
  document.getElementById('fbList').innerHTML = members.map(m=>{
    const fb = fbDone[m.id];
    return`<div class="fb-card" onclick="openFbModal('${m.id}','${m.name}')">
      <div class="fb-hdr">
        <div class="fb-av">${m.name[0]}</div>
        <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${m.name}</div><div style="font-size:10px;color:var(--mid);">${m.class}</div></div>
        ${fb?'<span style="font-size:10px;background:var(--g2);color:white;padding:2px 8px;border-radius:8px;">완료</span>':'<span class="new-badge">미작성</span>'}
      </div>
      ${fb?`<div class="chip-row">${(fb.parts||[]).map(p=>`<span class="chip cb">${p}</span>`).join('')}<span class="chip cg">${'⭐'.repeat(fb.rating||0)}</span></div><div style="font-size:11px;color:var(--mid);">${(fb.note||'').slice(0,50)}</div>`:''}
    </div>`;
  }).join('');
}

function openFbModal(id, name) {
  fbMbrId=id; fbRating=0; fbCond=''; fbParts=[]; fbBodyComments={}; selectedBodyKey=null;
  initBodyMap();
  document.getElementById('fbModalTitle').textContent = name+' 피드백';
  document.querySelectorAll('.cond-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.bp').forEach(b=>b.classList.remove('active'));
  document.getElementById('fbNote').value='';
  document.getElementById('fbNext').value='';
  updateStars(0); openModal('fbModal');
}

function selCond(el,v){document.querySelectorAll('.cond-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');fbCond=v;}
function togPart(el){el.classList.toggle('active');const v=el.textContent;fbParts=fbParts.includes(v)?fbParts.filter(p=>p!==v):[...fbParts,v];}
function setRating(n){fbRating=n;updateStars(n);}
function updateStars(n){document.querySelectorAll('.star').forEach((s,i)=>s.textContent=i<n?'⭐':'☆');}

const BODY_COLORS = {
  chest:'#4A90D9', core:'#2A7A5A', arm:'#C4A055', back:'#7B68EE', glute:'#E07050', leg:'#5BA85A'
};

function initBodyMap() {
  // 신체 색상 초기화
  document.querySelectorAll('.fb-muscle-part').forEach(el=>{
    el.style.fill='#E8E4DC';
  });
  // 코멘트 영역 초기화
  document.getElementById('bodyCommentArea').style.display='none';
  document.getElementById('bodyCommentInput').value='';
  document.getElementById('bodyCommentList').innerHTML='';

  // 클릭 이벤트
  document.querySelectorAll('.fb-muscle-part').forEach(el=>{
    el.addEventListener('click', ()=>{
      const key = el.dataset.key;
      const label = el.dataset.label;
      selectedBodyKey = key;

      // 같은 key 모두 강조
      document.querySelectorAll('.fb-muscle-part').forEach(e=>{
        if(e.dataset.key===key) e.style.fill=BODY_COLORS[key]||'#4A90D9';
      });

      // 코멘트 영역 표시
      document.getElementById('bodyCommentArea').style.display='block';
      document.getElementById('bodyCommentLabel').textContent='💪 '+label+' 코멘트';
      // 기존 코멘트 있으면 불러오기
      document.getElementById('bodyCommentInput').value = fbBodyComments[key]||'';
      renderBodyCommentList();
    });
  });

  // 저장 버튼
  document.getElementById('bodyCommentSaveBtn').addEventListener('click', ()=>{
    if(!selectedBodyKey)return;
    const val = document.getElementById('bodyCommentInput').value.trim();
    if(val) fbBodyComments[selectedBodyKey]=val;
    else delete fbBodyComments[selectedBodyKey];
    renderBodyCommentList();
    document.getElementById('bodyCommentArea').style.display='none';
    showToast('코멘트 저장됨 ✓');
  });
}

function renderBodyCommentList() {
  const list = document.getElementById('bodyCommentList');
  const keys = Object.keys(fbBodyComments);
  if(!keys.length){list.innerHTML='';return;}
  list.innerHTML = keys.map(k=>{
    const label = document.querySelector(`.fb-muscle-part[data-key="${k}"]`)?.dataset.label || k;
    return `<div style="display:flex;justify-content:space-between;align-items:center;background:var(--cream);border-radius:8px;padding:6px 10px;margin-bottom:4px;font-size:11px;">
      <span><b style="color:${BODY_COLORS[k]};">● ${label}</b> ${fbBodyComments[k]}</span>
      <button onclick="deleteBodyComment('${k}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;">✕</button>
    </div>`;
  }).join('');
}

function deleteBodyComment(key) {
  delete fbBodyComments[key];
  // 색상도 초기화
  document.querySelectorAll(`.fb-muscle-part[data-key="${key}"]`).forEach(e=>e.style.fill='#E8E4DC');
  renderBodyCommentList();
}
window.deleteBodyComment = deleteBodyComment;

async function saveFb() {
  const note = document.getElementById('fbNote').value.trim();
  if(!note){showToast('코멘트를 입력하세요');return;}
  const deduct = parseInt(document.getElementById('fbDeduct').value)||0;
  // 피드백 저장
  const fbId = `${todayKey}_${fbMbrId}`;
  await setDoc(doc(db,'feedbacks',fbId), {
    memberId:fbMbrId, date:todayKey, condition:fbCond||'😐 보통',
    parts:fbParts, rating:fbRating||3, note,
    next:document.getElementById('fbNext').value,
    bodyComments:fbBodyComments,
    createdAt: new Date().toISOString()
  });
  // 레슨 횟수 차감
  if(deduct>0) {
    const mRef = doc(db,'members',fbMbrId);
    const mSnap = await getDoc(mRef);
    if(mSnap.exists()) {
      const used = (mSnap.data().lessonUsed||0)+deduct;
      await updateDoc(mRef, {lessonUsed: used});
    }
  }
  closeModal('fbModal');
  renderFb();
  showToast('피드백 저장 완료 ✓');
}

// ── DIET ──
async function renderDiet() {
  const snap = await getDocs(query(collection(db,'diets'), orderBy('date','desc')));
  if(snap.empty){
    document.getElementById('dietList').innerHTML='<div class="empty"><div class="empty-i">🥗</div><div style="font-size:13px;">업로드된 식단 없음</div></div>';
    return;
  }
  const container = document.getElementById('dietList');
  container.innerHTML='';
  snap.docs.forEach(d=>{
    const dt=d.data();
    const card=document.createElement('div');
    card.className='diet-card';
    card.innerHTML=`
      <div class="diet-meta">
        <div><div style="font-size:13px;font-weight:600;">${dt.memberName}</div><div style="font-size:11px;color:var(--mid);">${dt.date}</div></div>
        <span style="font-size:10px;padding:3px 9px;border-radius:10px;${dt.status==='done'?'background:var(--gp);color:var(--g2);':'background:#FFF3E0;color:#D07030;'}">${dt.status==='done'?'완료':'대기중'}</span>
      </div>
      ${dt.imageUrl?`<img class="diet-img" src="${dt.imageUrl}" alt="식단 사진">`:'<div class="diet-img" style="display:flex;align-items:center;justify-content:center;font-size:36px;">📷</div>'}
      ${dt.kcal?`<div style="font-size:12px;color:var(--g2);font-weight:600;margin-bottom:6px;">예상 칼로리: ${dt.kcal} kcal</div>`:''}
      ${dt.comment?`<div style="font-size:12px;color:var(--stone);line-height:1.6;margin-bottom:6px;">${dt.comment}</div>`:''}
      ${dt.suggest?`<div style="font-size:11px;color:var(--g2);">→ ${dt.suggest}</div>`:''}
      <div style="display:flex;gap:8px;margin-top:10px;">
        <div class="cmt-btn-wrap" style="flex:1;"></div>
        <button class="del-diet-btn" style="padding:10px 14px;background:#FDECEA;color:var(--red);border:none;border-radius:12px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;">🗑 삭제</button>
      </div>`;

    // 코멘트 버튼 (이벤트 직접 바인딩)
    if(dt.status!=='done'){
      const cmtBtn=document.createElement('button');
      cmtBtn.className='btn-f';
      cmtBtn.style.cssText='width:100%;margin-top:0;';
      cmtBtn.textContent='코멘트 작성';
      cmtBtn.addEventListener('click',()=>openDietCmt(d.id, dt.memberName, dt.imageUrl||''));
      card.querySelector('.cmt-btn-wrap').appendChild(cmtBtn);
    }

    // 삭제 버튼 이벤트 직접 바인딩
    card.querySelector('.del-diet-btn').addEventListener('click',()=>deleteDiet(d.id, dt.imageUrl||''));

    container.appendChild(card);
  });
}

function openDietCmt(id, name, imgUrl) {
  dietDocId=id;
  document.getElementById('dietCmtTitle').textContent = name+' 식단 코멘트';
  document.getElementById('dietImgPreview').innerHTML = imgUrl ? `<img src="${imgUrl}" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover;">` : '<div style="text-align:center;font-size:36px;padding:20px;">📷</div>';
  document.getElementById('dietKcal').value='';
  document.getElementById('dietCmt').value='';
  document.getElementById('dietSuggest').value='';
  openModal('dietCmtModal');
}

async function saveDietCmt() {
  if(!dietDocId)return;
  const kcal=document.getElementById('dietKcal').value;
  const cmt=document.getElementById('dietCmt').value.trim();
  if(!cmt){showToast('코멘트를 입력하세요');return;}
  await updateDoc(doc(db,'diets',dietDocId), {
    kcal, comment:cmt, suggest:document.getElementById('dietSuggest').value, status:'done',
    commentedAt: new Date().toISOString()
  });
  closeModal('dietCmtModal');
  renderDiet();
  showToast('식단 코멘트 저장 완료 ✓');
}

// ── COLUMNS ──
async function renderColumns() {
  const snap = await getDocs(query(collection(db,'columns'), orderBy('createdAt','desc')));
  document.getElementById('columnList').innerHTML = snap.empty ? '<div class="empty"><div class="empty-i">📖</div><div style="font-size:13px;">칼럼을 추가해 보세요</div></div>' :
    snap.docs.map(d=>{
      const dt=d.data();
      return`<div class="col-card">
        <span class="col-tag">${dt.category}</span>
        <div class="col-title">${dt.title}</div>
        <div class="col-preview">${dt.content.slice(0,80)}...</div>
        <div style="display:flex;gap:8px;margin-top:10px;">
          <button style="flex:1;padding:8px;background:var(--gp);color:var(--g2);border:none;border-radius:10px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;" onclick="openColDetail('${d.id}')">전체 보기</button>
          <button style="padding:8px 14px;background:#FDECEA;color:var(--red);border:none;border-radius:10px;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;" onclick="deleteColumn('${d.id}')">삭제</button>
        </div>
      </div>`;
    }).join('');
}

window.openColDetail = function(id) {}; // 상세 보기는 모달로 추가 가능

async function saveColumn() {
  const title=document.getElementById('colTitle').value.trim();
  const content=document.getElementById('colContent').value.trim();
  if(!title||!content){showToast('제목과 내용을 입력하세요');return;}
  await addDoc(collection(db,'columns'), {
    category:document.getElementById('colCat').value, title, content,
    createdAt: new Date().toISOString()
  });
  closeModal('addColModal');
  renderColumns();
  showToast('칼럼 저장 완료 ✓');
  document.getElementById('colTitle').value='';
  document.getElementById('colContent').value='';
}

async function deleteDiet(id, imageUrl) {
  if(!confirm('이 식단 기록을 삭제하시겠습니까?'))return;
  try {
    if(imageUrl) {
      const imgRef = ref(storage, imageUrl);
      await deleteObject(imgRef).catch(()=>{});
    }
    await deleteDoc(doc(db,'diets',id));
    renderDiet();
    showToast('식단 기록이 삭제되었습니다');
  } catch(e) {
    showToast('삭제 중 오류가 발생했습니다');
  }
}

async function deleteColumn(id) {
  if(!confirm('칼럼을 삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'columns',id));
  renderColumns();
}

// ── SCHEDULE ──
async function renderSchedule() {
  const snap = await getDocs(collection(db,'classes'));
  const classes = snap.docs.map(d=>({id:d.id,...d.data()}));
  document.getElementById('schedList').innerHTML = classes.map(c=>`
    <div class="card">
      <div class="ct"><div class="ct-t">${c.time}</div><div class="ct-s">${c.day}요일</div></div>
      <div class="ci"><div class="cn">${c.name}</div><div class="cd">${c.level} · 최대 ${c.max}명</div></div>
      <button style="background:none;border:none;font-size:18px;cursor:pointer;" onclick="deleteCls('${c.id}')">🗑</button>
    </div>`).join('') || '<div class="empty"><div class="empty-i">📅</div><div style="font-size:13px;">수업을 추가해 보세요</div></div>';
}

async function saveCls() {
  const name=document.getElementById('cN').value.trim();
  if(!name){showToast('수업명을 입력하세요');return;}
  await addDoc(collection(db,'classes'), {
    name, day:document.getElementById('cD').value,
    time:document.getElementById('cT').value||'10:00',
    max:parseInt(document.getElementById('cM').value)||6,
    level:document.getElementById('cL').value
  });
  closeModal('addClsModal');
  renderSchedule();
  showToast('수업 추가 완료 ✓');
}

async function deleteCls(id) {
  if(!confirm('수업을 삭제하시겠습니까?'))return;
  await deleteDoc(doc(db,'classes',id));
  renderSchedule();
}

// ── MODAL ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 초기 실행
renderHome();
</script>
