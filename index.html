<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="뉴런필라테스">
<meta name="theme-color" content="#2A7A5A">
<link rel="manifest" href="manifest.json">
<title>뉴런필라테스</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#0D2E20 0%,#1A5C3A 50%,#2A7A5A 100%);}
.logo-wrap{margin-bottom:12px;}
.logo-img{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 4px 20px rgba(0,0,0,0.3));}
.app-name{font-size:26px;font-weight:700;color:white;text-align:center;letter-spacing:-0.5px;margin-bottom:4px;}
.app-sub{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;margin-bottom:48px;}
.btn{display:block;width:100%;max-width:320px;padding:20px 22px;border-radius:20px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:16px;font-weight:700;cursor:pointer;text-decoration:none;text-align:left;margin-bottom:14px;transition:transform 0.15s,box-shadow 0.15s;position:relative;overflow:hidden;}
.btn:active{transform:scale(0.97);}
.btn-instructor{background:rgba(255,255,255,0.12);color:white;border:1.5px solid rgba(255,255,255,0.25);backdrop-filter:blur(10px);}
.btn-member{background:white;color:#1A5C3A;}
.btn-icon{font-size:26px;margin-bottom:6px;display:block;}
.btn-title{font-size:16px;font-weight:700;}
.btn-label{font-size:12px;opacity:0.65;font-weight:400;margin-top:3px;line-height:1.4;}
.install-guide{margin-top:28px;background:rgba(255,255,255,0.08);border-radius:16px;padding:16px 20px;max-width:320px;width:100%;border:1px solid rgba(255,255,255,0.12);}
.install-title{font-size:12px;font-weight:700;color:#7ECBA0;margin-bottom:10px;letter-spacing:0.05em;}
.install-step{font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:7px;display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
.install-num{background:#2A7A5A;color:white;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
</style>
</head>
<body>
<div class="logo-wrap">
  <img class="logo-img" src="logo.png" alt="뉴런필라테스 로고">
</div>
<div class="app-name">뉴런필라테스</div>
<div class="app-sub">Neuron Pilates Studio</div>

<a class="btn btn-instructor" href="instructor.html">
  <span class="btn-icon">👩‍🏫</span>
  <div class="btn-title">강사 앱</div>
  <div class="btn-label">회원 관리 · 출석 체크 · 피드백 작성 · 수업 일정</div>
</a>
<a class="btn btn-member" href="member.html">
  <span class="btn-icon" style="color:#1A5C3A;">🧘</span>
  <div class="btn-title" style="color:#1A5C3A;">회원 앱</div>
  <div class="btn-label" style="color:#2A7A5A;">피드백 확인 · 수업 예약 · 홈트레이닝 · 출석 기록</div>
</a>

<div class="install-guide">
  <div class="install-title">📲 앱으로 설치하는 방법</div>
  <div class="install-step"><span class="install-num">1</span><span>이 페이지를 <strong style="color:white;">크롬 또는 사파리</strong>로 열기</span></div>
  <div class="install-step"><span class="install-num">2</span><span><strong style="color:white;">아이폰:</strong> 하단 공유버튼 → "홈 화면에 추가"<br><strong style="color:white;">안드로이드:</strong> 우상단 메뉴 → "앱 설치"</span></div>
  <div class="install-step"><span class="install-num">3</span><span>홈 화면에 <strong style="color:white;">뉴런필라테스 아이콘</strong> 생성 완료!</span></div>
</div>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
