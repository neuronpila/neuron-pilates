<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2A7A5A">
<title>뉴런필라테스 회원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --green:#1A5C3A; --green2:#2A7A5A; --green-light:#7ECBA0; --green-pale:#E8F5EE;
  --stone:#2E2E2B; --mid:#6B6B68; --cream:#F7F5F1; --white:#FDFCFA;
  --gold:#C4A055; --red:#D9634E; --blue:#5B8DB8;
  --shadow:rgba(26,92,58,0.12); --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--stone);min-height:100vh;max-width:430px;margin:0 auto;}
.header{background:linear-gradient(135deg,var(--green),var(--green2));color:white;padding:16px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;}
.header-logo{width:32px;height:32px;object-fit:contain;}
.header-info{flex:1;}
.header-name{font-size:16px;font-weight:700;}
.header-sub{font-size:11px;opacity:0.75;margin-top:1px;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid rgba(0,0,0,0.08);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:10px 2px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--mid);transition:color 0.2s;}
.nav-btn.active{color:var(--green2);}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;font-weight:500;}
.content{padding:0 0 80px;}
.panel{display:none;}
.panel.active{display:block;}
.section{padding:14px 14px 0;}
.section-title{font-size:12px;font-weight:700;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.section-title span{font-size:12px;color:var(--green2);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;}

/* 홈 히어로 */
.hero{margin:14px;background:linear-gradient(135deg,var(--stone),#3D3D3A);border-radius:20px;padding:20px;color:white;}
.hero-lbl{font-size:11px;opacity:0.65;margin-bottom:4px;}
.hero-val{font-size:36px;font-weight:700;line-height:1;}
.hero-sub{font-size:12px;opacity:0.65;margin-top:6px;}
.hero-row{display:flex;margin-top:16px;}
.hero-stat{flex:1;text-align:center;}
.hero-stat-num{font-size:22px;font-weight:700;}
.hero-stat-lbl{font-size:10px;opacity:0.6;margin-top:2px;}
.hero-div{width:1px;background:rgba(255,255,255,0.15);}

/* 피드백 카드 */
.fb-card{background:var(--white);border-radius:var(--radius);padding:18px;box-shadow:0 2px 12px var(--shadow);margin-bottom:12px;}
.fb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fb-date{background:var(--green-pale);color:var(--green2);padding:4px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.fb-from{font-size:11px;color:var(--mid);}
.fb-cond{font-size:15px;font-weight:600;margin-bottom:8px;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:4px 9px;border-radius:10px;font-size:11px;font-weight:500;}
.chip-green{background:var(--green-pale);color:var(--green2);}
.chip-blue{background:#E8EEF8;color:var(--blue);}
.fb-note-text{font-size:13px;line-height:1.75;color:var(--stone);}
.fb-next-box{margin-top:10px;padding:10px 12px;background:var(--green-pale);border-radius:10px;font-size:12px;color:var(--green2);}

/* 예약 */
.class-card{background:var(--white);border-radius:var(--radius);padding:14px 16px;box-shadow:0 2px 10px var(--shadow);display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.ct-badge{min-width:50px;text-align:center;background:var(--green-pale);border-radius:10px;padding:8px 4px;}
.ct-time{font-size:13px;font-weight:700;color:var(--green2);}
.ct-day{font-size:10px;color:var(--green-light);}
.ct-info{flex:1;}
.ct-name{font-size:14px;font-weight:600;}
.ct-detail{font-size:11px;color:var(--mid);margin-top:2px;}
.btn-book{padding:8px 14px;background:var(--green2);color:white;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;}
.btn-booked{background:var(--green-pale);color:var(--green2);border:1px solid var(--green-light);}

/* 출석 기록 */
.rec-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.rec-card{background:var(--white);border-radius:var(--radius);padding:14px 10px;text-align:center;box-shadow:0 2px 10px var(--shadow);}
.rec-num{font-size:26px;font-weight:700;color:var(--stone);}
.rec-lbl{font-size:10px;color:var(--mid);margin-top:4px;}
.att-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px;}
.att-day-lbl{text-align:center;font-size:9px;color:var(--mid);padding-bottom:3px;}
.att-dot{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:white;}
.dot-p{background:var(--green2);}
.dot-a{background:#FDECEA;color:var(--red);}
.dot-n{background:#E8E8E8;}

/* 홈트레이닝 */
.ht-tabs{display:flex;gap:0;background:var(--white);border-radius:12px;padding:3px;box-shadow:0 2px 8px var(--shadow);margin-bottom:14px;}
.ht-tab{flex:1;padding:8px 4px;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--mid);transition:all 0.2s;}
.ht-tab.active{background:var(--green2);color:white;}
.ht-card{background:var(--white);border-radius:var(--radius);padding:16px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;cursor:pointer;transition:transform 0.15s;}
.ht-card:active{transform:scale(0.98);}
.ht-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.ht-emoji{font-size:34px;flex-shrink:0;}
.ht-title{font-size:14px;font-weight:700;}
.ht-sub{font-size:11px;color:var(--mid);margin-top:3px;}
.ht-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.ht-tag{padding:3px 9px;border-radius:8px;font-size:11px;font-weight:500;}
.tag-green{background:var(--green-pale);color:var(--green2);}
.tag-time{background:#E8EEF8;color:var(--blue);}
.tag-level{background:#FFF3E0;color:#D07030;}
.ht-steps{font-size:12px;color:var(--mid);line-height:1.7;}
.ht-video-btn{width:100%;padding:11px;background:var(--green2);color:white;border:none;border-radius:12px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;}

/* 타이머 */
.timer-card{background:linear-gradient(135deg,var(--green),var(--green2));border-radius:20px;padding:24px 20px;text-align:center;color:white;margin-bottom:16px;}
.timer-display{font-size:56px;font-weight:700;letter-spacing:0.05em;font-variant-numeric:tabular-nums;}
.timer-label{font-size:13px;opacity:0.75;margin-top:4px;}
.timer-btns{display:flex;gap:10px;margin-top:16px;justify-content:center;}
.timer-btn{padding:12px 24px;border-radius:12px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.timer-start{background:white;color:var(--green2);}
.timer-reset{background:rgba(255,255,255,0.2);color:white;}

/* 온보딩 */
.onboard{padding:32px 20px;display:flex;flex-direction:column;align-items:center;}
.ob-logo{width:100px;height:100px;object-fit:contain;margin-bottom:16px;}
.ob-title{font-size:24px;font-weight:700;margin-bottom:6px;text-align:center;}
.ob-sub{font-size:13px;color:var(--mid);text-align:center;margin-bottom:32px;line-height:1.6;}
.form-group{margin-bottom:14px;width:100%;max-width:320px;}
.form-label{font-size:12px;font-weight:600;color:var(--mid);margin-bottom:6px;display:block;}
.form-input{width:100%;padding:12px 14px;border:1.5px solid rgba(0,0,0,0.10);border-radius:12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--stone);transition:border-color 0.2s;}
.form-input:focus{outline:none;border-color:var(--green2);}
.btn-full{width:100%;max-width:320px;padding:14px;background:var(--green2);color:white;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-outline-full{width:100%;padding:12px;background:transparent;color:var(--green2);border:1.5px solid var(--green2);border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;border-radius:2px;background:rgba(0,0,0,0.15);margin:0 auto 20px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--stone);color:white;padding:12px 20px;border-radius:12px;font-size:13px;white-space:nowrap;opacity:0;transition:all 0.25s;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<!-- 온보딩 화면 -->
<div id="onboardScreen">
  <div class="onboard">
    <img class="ob-logo" src="logo.png" alt="뉴런필라테스">
    <div class="ob-title">뉴런필라테스<br>회원 앱</div>
    <div class="ob-sub">강사 피드백 확인, 수업 예약,<br>홈트레이닝까지 한 곳에서!</div>
    <div class="form-group"><label class="form-label">내 이름</label><input class="form-input" id="inputName" placeholder="예: 이소연"></div>
    <div class="form-group">
      <label class="form-label">수강 클래스</label>
      <select class="form-input" id="inputClass">
        <option>기초 필라테스</option><option>코어 강화</option><option>바디밸런스</option><option>저녁 플로우</option>
      </select>
    </div>
    <button class="btn-full" onclick="startApp()">시작하기</button>
    <div style="margin-top:16px;font-size:11px;color:var(--mid);text-align:center;">처음 오셨나요? 이름과 클래스를 입력하면<br>강사 선생님의 피드백을 바로 확인할 수 있어요.</div>
  </div>
</div>

<!-- 앱 본체 (온보딩 후 표시) -->
<div id="appScreen" style="display:none;">
  <div class="header" id="mainHeader">
    <img class="header-logo" src="logo.png" alt="logo">
    <div class="header-info">
      <div class="header-name" id="headerName"></div>
      <div class="header-sub" id="headerClass"></div>
    </div>
  </div>

  <div class="content">
    <!-- 홈 -->
    <div class="panel active" id="panel-home">
      <div class="hero" id="heroCard">
        <div class="hero-lbl">이번 달 출석률</div>
        <div class="hero-val" id="heroRate">-</div>
        <div class="hero-sub" id="heroSub"></div>
        <div class="hero-row">
          <div class="hero-stat"><div class="hero-stat-num" id="heroP">0</div><div class="hero-stat-lbl">출석</div></div>
          <div class="hero-div"></div>
          <div class="hero-stat"><div class="hero-stat-num" id="heroA">0</div><div class="hero-stat-lbl">결석</div></div>
          <div class="hero-div"></div>
          <div class="hero-stat"><div class="hero-stat-num" id="heroT">0</div><div class="hero-stat-lbl">누적</div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">최근 강사 피드백 <span onclick="switchTab('feedback')">전체 보기</span></div>
        <div id="homeFb"></div>
      </div>
      <div class="section" style="margin-top:4px;">
        <div class="section-title">다음 수업 <span onclick="switchTab('booking')">예약하기</span></div>
        <div id="homeBooking"></div>
      </div>
      <div class="section" style="margin-top:4px;padding-bottom:4px;">
        <div class="section-title">오늘의 홈트레이닝 <span onclick="switchTab('hometraining')">전체 보기</span></div>
        <div id="homeTodayHT"></div>
      </div>
    </div>

    <!-- 피드백 -->
    <div class="panel" id="panel-feedback">
      <div class="section">
        <div class="section-title">강사 피드백 전체</div>
        <div id="feedbackFull"></div>
      </div>
    </div>

    <!-- 예약 -->
    <div class="panel" id="panel-booking">
      <div class="section">
        <div style="background:var(--green-pale);border-radius:14px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">🧘</span>
          <div><div style="font-size:12px;color:var(--green2);font-weight:600;">내 수강 클래스</div><div style="font-size:15px;font-weight:700;" id="myClassLabel"></div></div>
        </div>
        <div class="section-title">수업 일정</div>
        <div id="bookingList"></div>
      </div>
    </div>

    <!-- 출석 기록 -->
    <div class="panel" id="panel-records">
      <div class="section">
        <div class="rec-row">
          <div class="rec-card"><div class="rec-num" id="recTotal">0</div><div class="rec-lbl">총 출석</div></div>
          <div class="rec-card"><div class="rec-num" id="recMonth">0</div><div class="rec-lbl">이번 달</div></div>
          <div class="rec-card"><div class="rec-num" id="recStreak">0</div><div class="rec-lbl">연속 출석</div></div>
        </div>
        <div class="section-title">출석 달력</div>
        <div id="attCalendar"></div>
        <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--mid);">
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--green2);margin-right:4px;vertical-align:middle;"></span>출석</span>
          <span><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#FDECEA;margin-right:4px;vertical-align:middle;"></span>결석</span>
        </div>
      </div>
    </div>

    <!-- 홈트레이닝 -->
    <div class="panel" id="panel-hometraining">
      <div class="section">
        <!-- 타이머 -->
        <div class="timer-card">
          <div class="timer-display" id="timerDisplay">00:00</div>
          <div class="timer-label" id="timerLabel">운동 타이머</div>
          <div class="timer-btns">
            <button class="timer-btn timer-start" id="timerBtn" onclick="toggleTimer()">▶ 시작</button>
            <button class="timer-btn timer-reset" onclick="resetTimer()">↺ 초기화</button>
          </div>
        </div>

        <!-- 운동 카테고리 탭 -->
        <div class="ht-tabs" id="htTabs">
          <button class="ht-tab active" onclick="selHtCat('beginner',this)">초급</button>
          <button class="ht-tab" onclick="selHtCat('core',this)">코어</button>
          <button class="ht-tab" onclick="selHtCat('stretch',this)">스트레칭</button>
          <button class="ht-tab" onclick="selHtCat('advanced',this)">고급</button>
        </div>
        <div id="htList"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="tab-home"><span class="nav-icon">🏠</span><span class="nav-label">홈</span></button>
    <button class="nav-btn" onclick="switchTab('feedback')" id="tab-feedback"><span class="nav-icon">💬</span><span class="nav-label">피드백</span></button>
    <button class="nav-btn" onclick="switchTab('booking')" id="tab-booking"><span class="nav-icon">📅</span><span class="nav-label">예약</span></button>
    <button class="nav-btn" onclick="switchTab('records')" id="tab-records"><span class="nav-icon">📊</span><span class="nav-label">기록</span></button>
    <button class="nav-btn" onclick="switchTab('hometraining')" id="tab-hometraining"><span class="nav-icon">🏋️</span><span class="nav-label">홈트레이닝</span></button>
  </nav>
</div>

<!-- 홈트 상세 모달 -->
<div class="modal-overlay" id="htModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="htModalTitle"></div>
    <div id="htModalBody"></div>
    <button class="btn-outline-full" onclick="closeModal('htModal')">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MKEY='neuron_pilates_member_v1';
const IKEY='neuron_pilates_instructor_v1';
const DAY=['일','월','화','수','목','금','토'];
const today=new Date();

function getIData(){const r=localStorage.getItem(IKEY);return r?JSON.parse(r):null;}
function loadMData(){const r=localStorage.getItem(MKEY);return r?JSON.parse(r):{name:'',class:'',bookings:[],initialized:false};}
function saveMData(){localStorage.setItem(MKEY,JSON.stringify(mData));}
let mData=loadMData();

// 샘플 피드백 (강사앱 미연동 시)
const sampleFbs=[
  {date:'2024-06-27',condition:'😄 좋음',parts:['코어','고관절'],rating:5,note:'자세가 많이 안정됐습니다! 호흡 조절이 눈에 띄게 좋아졌어요. 다음에는 티저 도전을 시작해봐요.',next:'티저 변형 자세부터 시작'},
  {date:'2024-06-20',condition:'😐 보통',parts:['허리','코어'],rating:4,note:'허리 긴장이 조금 있어 스트레칭 위주로 진행했습니다. 꾸준히 잘 참여하고 계세요!',next:'고양이-소 스트레칭 매일 5분'},
  {date:'2024-06-13',condition:'😄 좋음',parts:['전신'],rating:5,note:'오늘 밸런스 동작에서 큰 발전이 있었습니다! 이 속도라면 중급 도전도 가능해요.',next:'싱글레그스트레치 집에서도 연습'},
];

// 홈트레이닝 데이터
const htData={
  beginner:[
    {emoji:'💨',title:'필라테스 호흡 훈련',time:'10분',level:'초급',tags:['호흡','코어'],
     desc:'필라테스의 기본인 흉식 호흡을 연습합니다.',
     steps:['① 바닥에 누워 무릎을 세웁니다.','② 코로 숨을 들이마시며 갈비뼈를 옆으로 넓힙니다.','③ 입으로 "쏴~" 소리를 내며 배꼽을 척추 쪽으로 당깁니다.','④ 10회 × 3세트 반복합니다.']},
    {emoji:'🐱',title:'고양이-소 스트레칭',time:'10분',level:'초급',tags:['척추','유연성'],

// 타이머
let timerInterval=null,timerSecs=0,timerRunning=false;
function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLabel').textContent='일시정지됨';}
  else{timerRunning=true;document.getElementById('timerBtn').textContent='⏸ 정지';document.getElementById('timerLabel').textContent='운동 중 🔥';
    timerInterval=setInterval(()=>{timerSecs++;const m=Math.floor(timerSecs/60),s=timerSecs%60;document.getElementById('timerDisplay').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSecs=0;document.getElementById('timerDisplay').textContent='00:00';document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLabel').textContent='운동 타이머';}

// 온보딩
function startApp(){
  const name=document.getElementById('inputName').value.trim();
  if(!name){showToast('이름을 입력해 주세요');return;}
  mData.name=name;mData.class=document.getElementById('inputClass').value;mData.initialized=true;
  saveMData();initApp();
}

function initApp(){
  document.getElementById('onboardScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const h=today.getHours();
  const greet=h<6?'새벽에도 건강하게 🌙':h<12?'좋은 아침이에요 ☀️':h<18?'안녕하세요 👋':'좋은 저녁이에요 🌙';
  document.getElementById('headerName').textContent=mData.name+'님  '+greet;
  document.getElementById('headerClass').textContent='뉴런필라테스 · '+mData.class;
  document.getElementById('myClassLabel').textContent=mData.class;
  renderHome();renderHt('beginner');
}

function switchTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='home')renderHome();
  else if(t==='feedback')renderFbFull();
  else if(t==='booking')renderBooking();
  else if(t==='records')renderRecords();
}

function getFbs(){
  const iData=getIData();
  if(iData){const me=iData.members.find(m=>m.name===mData.name);if(me)return iData.feedbacks.filter(f=>f.memberId===me.id).reverse();}
  return sampleFbs;
}

function renderFbCard(fb,preview=false){
  const note=preview?fb.note.slice(0,70)+(fb.note.length>70?'...':''):fb.note;
  return`<div class="fb-card">
    <div class="fb-top"><span class="fb-date">${fb.date}</span><span class="fb-from">뉴런필라테스 강사</span></div>
    <div style="font-size:14px;margin-bottom:6px;">${'⭐'.repeat(fb.rating)}${'☆'.repeat(5-fb.rating)}</div>
    <div class="fb-cond">${fb.condition}</div>
    <div class="chip-row">${fb.parts.map(p=>`<span class="chip chip-blue">${p}</span>`).join('')}</div>
    <div class="fb-note-text">${note}</div>
    ${fb.next?`<div class="fb-next-box">→ 다음 수업 권장: ${fb.next}</div>`:''}
  </div>`;
}

function renderHome(){
  const fbs=getFbs();
  const iData=getIData();
  let p=0,a=0;
  if(iData){const me=iData.members.find(m=>m.name===mData.name);if(me){Object.values(iData.attendance).forEach(d=>{if(d[me.id]==='present')p++;else if(d[me.id]==='absent')a++;});}}
  else{p=12;a=2;}
  const t=p+a;const rate=t?Math.round(p/t*100):0;
  document.getElementById('heroRate').textContent=rate+'%';
  document.getElementById('heroSub').textContent=`총 ${t}회 중 ${p}회 출석`;
  document.getElementById('heroP').textContent=p;
  document.getElementById('heroA').textContent=a;
  document.getElementById('heroT').textContent=p;
  document.getElementById('homeFb').innerHTML=fbs.length?renderFbCard(fbs[0],true)+'<div style="text-align:center;margin-top:8px;"><span style="font-size:12px;color:var(--green2);font-weight:600;cursor:pointer;" onclick="switchTab(\'feedback\')">전체 피드백 보기 →</span></div>':'<div style="text-align:center;padding:20px;color:var(--mid);">아직 피드백이 없습니다</div>';

  const iClasses=iData?iData.classes:[
    {id:1,name:'기초 필라테스',day:'월',time:'10:00',max:6,level:'초급'},
    {id:2,name:'코어 강화',day:'화',time:'12:00',max:6,level:'중급'},
  ];
  const todayDay=DAY[today.getDay()];
  const nc=iClasses.find(c=>c.day===todayDay)||iClasses[0];
  document.getElementById('homeBooking').innerHTML=nc?`
    <div class="class-card">
      <div class="ct-badge"><div class="ct-time">${nc.time}</div><div class="ct-day">${nc.day}요일</div></div>
      <div class="ct-info"><div class="ct-name">${nc.name}</div><div class="ct-detail">${nc.level||''} 수업 · 최대 ${nc.max}명</div></div>
      <button class="btn-book" onclick="quickBook(${nc.id})">예약</button>
    </div>`:'';

  // 오늘의 홈트 추천
  const todayHt=htData.beginner[0];
  document.getElementById('homeTodayHT').innerHTML=`
    <div class="ht-card" onclick="openHtModal(0,'beginner')">
      <div class="ht-header"><span class="ht-emoji">${todayHt.emoji}</span>
        <div><div class="ht-title">${todayHt.title}</div><div class="ht-sub">오늘의 추천 동작</div></div>
      </div>
      <div class="ht-meta"><span class="ht-tag tag-green">${todayHt.tags[0]}</span><span class="ht-tag tag-time">⏱ ${todayHt.time}</span><span class="ht-tag tag-level">${todayHt.level}</span></div>
    </div>`;
}

  const fbs=getFbs();

function renderBooking(){
  const iData=getIData();
  const classes=iData?iData.classes:[
    {id:1,name:'기초 필라테스',day:'월',time:'10:00',max:6,level:'초급'},
    {id:2,name:'코어 강화',day:'화',time:'12:00',max:6,level:'중급'},
    {id:3,name:'바디밸런스',day:'수',time:'14:00',max:8,level:'중급'},
    {id:4,name:'저녁 플로우',day:'금',time:'19:00',max:8,level:'초급'},
  ];
  if(!mData.bookings)mData.bookings=[];
  document.getElementById('bookingList').innerHTML=classes.map(c=>{
    const booked=mData.bookings.includes(c.id);
    return`<div class="class-card">
      <div class="ct-badge"><div class="ct-time">${c.time}</div><div class="ct-day">${c.day}요일</div></div>
      <div class="ct-info"><div class="ct-name">${c.name}</div><div class="ct-detail">${c.level} · 최대 ${c.max}명</div>
        <div style="font-size:11px;margin-top:3px;color:${booked?'var(--green2)':'var(--mid)'};">${booked?'✓ 예약 완료':'예약 가능'}</div>
      </div>
      <button class="btn-book ${booked?'btn-booked':''}" onclick="toggleBook(${c.id})">${booked?'취소':'예약'}</button>
    </div>`;
  }).join('');
}

function toggleBook(id){
  if(!mData.bookings)mData.bookings=[];
  if(mData.bookings.includes(id)){mData.bookings=mData.bookings.filter(b=>b!==id);showToast('예약이 취소되었습니다');}
  else{mData.bookings.push(id);showToast('예약 완료! 수업에서 뵙겠습니다 🌿');}
  saveMData();renderBooking();
}
function quickBook(id){if(!mData.bookings)mData.bookings=[];if(!mData.bookings.includes(id)){mData.bookings.push(id);saveMData();showToast('예약 완료! 🌿');}}

function renderRecords(){
  const iData=getIData();
  let present=0,absent=0,streak=0;
  const dots=[];
  if(iData){
    const me=iData.members.find(m=>m.name===mData.name);
    if(me){Object.entries(iData.attendance).sort((a,b)=>a[0]<b[0]?-1:1).forEach(([date,att])=>{if(att[me.id]==='present'){present++;dots.push({date,s:'p'});}else if(att[me.id]==='absent'){absent++;dots.push({date,s:'a'});}});}
  } else {
    for(let i=1;i<=12;i++)dots.push({date:`2024-06-${String(i+8).padStart(2,'0')}`,s:'p'});
    dots.push({date:'2024-06-22',s:'a'});present=12;absent=1;
  }
  const sorted=[...dots].sort((a,b)=>b.date<a.date?-1:1);
  for(const d of sorted){if(d.s==='p')streak++;else break;}
  document.getElementById('recTotal').textContent=present;
  document.getElementById('recMonth').textContent=dots.filter(d=>d.date.slice(0,7)===today.toISOString().slice(0,7)&&d.s==='p').length;
  document.getElementById('recStreak').textContent=streak;
  const yr=today.getFullYear(),mo=today.getMonth();
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=new Date(yr,mo,1).getDay();
  let cal=`<div class="att-grid">${['일','월','화','수','목','금','토'].map(d=>`<div class="att-day-lbl">${d}</div>`).join('')}`;
  for(let i=0;i<fd;i++)cal+='<div></div>';
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec=dots.find(c=>c.date===ds);
    const cls=rec?(rec.s==='p'?'dot-p':'dot-a'):'dot-n';
    cal+=`<div class="att-dot ${cls}">${rec?(rec.s==='p'?'✓':'✗'):d}</div>`;
  }
  cal+='</div>';
  document.getElementById('attCalendar').innerHTML=cal;
}

      <span class="ht-tag tag-level">${ex.level}</span>
    </div>
    <p style="font-size:13px;color:var(--mid);line-height:1.7;margin-bottom:14px;">${ex.desc}</p>
    <div style="font-size:12px;font-weight:700;color:var(--mid);margin-bottom:8px;">운동 방법</div>
    <div style="font-size:13px;line-height:2;color:var(--stone);">${ex.steps.join('<br>')}</div>
    <button class="ht-video-btn" onclick="closeModal('htModal');switchTab('hometraining');toggleTimer();">
      ▶ 타이머 시작하기
    </button>`;
  openModal('htModal');
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

if(mData.initialized)initApp();
</script>
</body>
</html>
