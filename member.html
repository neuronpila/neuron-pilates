<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2A7A5A">
<link rel="manifest" href="manifest.json">
<title>뉴런필라테스 회원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Inter:wght@400;600;700;800&display=swap');
:root{
  --g:#1A5C3A;--g2:#2A7A5A;--g3:#3D9970;--gl:#7ECBA0;--gp:#E8F5EE;--gp2:#D0EDD9;
  --stone:#1E1E1B;--stone2:#2E2E2B;--mid:#737370;--light:#A8A8A5;
  --cream:#F5F3EF;--cream2:#EDEBE7;--white:#FDFCFA;
  --gold:#C4A055;--red:#D9634E;--red-bg:#FDF0EE;--blue:#4A7DB5;--blue-bg:#EEF3FA;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07);
  --shadow:0 4px 16px rgba(26,92,58,0.10);
  --shadow-md:0 8px 28px rgba(26,92,58,0.15);
  --r:18px;--r-sm:12px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--stone);min-height:100vh;max-width:430px;margin:0 auto;}

/* ── ONBOARDING ── */
#onboardScreen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:32px 24px;
  background:linear-gradient(160deg,#0D2E20 0%,#1A5C3A 55%,#2A7A5A 100%);
}
.ob-logo{width:100px;height:100px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.4));}
.ob-name{font-size:26px;font-weight:700;color:white;text-align:center;letter-spacing:-0.5px;margin-bottom:4px;}
.ob-sub{font-size:13px;color:rgba(255,255,255,0.55);text-align:center;margin-bottom:32px;line-height:1.6;}
.ob-card{width:100%;max-width:340px;background:rgba(255,255,255,0.08);border-radius:24px;padding:24px 20px;border:1px solid rgba(255,255,255,0.14);backdrop-filter:blur(10px);}
.ob-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:6px;display:block;letter-spacing:0.05em;}
.ob-input{
  width:100%;padding:12px 14px;border:1.5px solid rgba(255,255,255,0.18);
  border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans KR',sans-serif;
  background:rgba(255,255,255,0.1);color:white;margin-bottom:14px;
  transition:border-color 0.2s;
}
.ob-input::placeholder{color:rgba(255,255,255,0.4);}
.ob-input:focus{outline:none;border-color:var(--gl);}
.ob-input option{background:#1A5C3A;color:white;}

/* 아바타 선택 - 온보딩 */
.ob-av-section{margin-bottom:16px;}
.ob-av-preview-row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.ob-av-preview{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:30px;
  background:rgba(255,255,255,0.15);box-shadow:0 4px 16px rgba(0,0,0,0.3);
  overflow:hidden;border:2px solid rgba(255,255,255,0.25);flex-shrink:0;
}
.ob-av-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ob-av-btns{display:flex;flex-direction:column;gap:7px;flex:1;}
.ob-av-btn{
  padding:9px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.1);font-family:'Noto Sans KR',sans-serif;
  font-size:12px;font-weight:600;cursor:pointer;color:white;text-align:left;
}
.ob-emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:8px;}
.ob-eg-btn{
  width:100%;aspect-ratio:1;border:none;background:rgba(255,255,255,0.08);
  border-radius:9px;font-size:20px;cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;justify-content:center;
}
.ob-eg-btn.selected{background:rgba(255,255,255,0.25);transform:scale(1.12);}

.ob-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--g3) 0%,var(--gl) 100%);
  color:white;border:none;border-radius:var(--r-sm);
  font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;
  cursor:pointer;margin-top:4px;box-shadow:0 4px 16px rgba(61,153,112,0.5);
}

/* ── APP HEADER ── */
.hdr{
  background:linear-gradient(135deg,var(--g) 0%,var(--g2) 60%,var(--g3) 100%);
  color:white;padding:12px 16px;position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 16px rgba(26,92,58,0.3);
}
.hdr-logo{width:30px;height:30px;object-fit:contain;}
.hdr-av{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:18px;
  background:rgba(255,255,255,0.15);overflow:hidden;
  border:2px solid rgba(255,255,255,0.3);cursor:pointer;
}
.hdr-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* ── NAV ── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:var(--white);
  border-top:1px solid rgba(0,0,0,0.06);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -4px 20px rgba(0,0,0,0.06);
}
.nb{
  flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;
  align-items:center;gap:2px;cursor:pointer;border:none;background:none;
  font-family:'Noto Sans KR',sans-serif;color:var(--light);transition:color 0.2s;
  font-size:9px;font-weight:500;position:relative;
}
.nb.active{color:var(--g2);}
.nb.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:3px;background:var(--g2);border-radius:0 0 3px 3px;}
.ni{font-size:18px;line-height:1;}

/* ── CONTENT ── */
.content{padding:0 0 82px;}
.panel{display:none;}
.panel.active{display:block;}

/* ── HERO ── */
.hero{
  margin:14px;background:linear-gradient(135deg,var(--stone2) 0%,#3D3D3A 100%);
  border-radius:22px;padding:20px 18px;color:white;
  box-shadow:var(--shadow-md);
}
.hero-lbl{font-size:11px;opacity:0.6;margin-bottom:4px;font-weight:500;}
.hero-val{font-family:'Inter',sans-serif;font-size:38px;font-weight:800;line-height:1;letter-spacing:-1px;}
.hero-sub{font-size:11px;opacity:0.55;margin-top:6px;}
.hero-row{display:flex;margin-top:16px;border-top:1px solid rgba(255,255,255,0.1);padding-top:14px;}
.hs{flex:1;text-align:center;}
.hs-n{font-family:'Inter',sans-serif;font-size:22px;font-weight:700;}
.hs-l{font-size:10px;opacity:0.55;margin-top:3px;}
.hd{width:1px;background:rgba(255,255,255,0.12);}

/* ── LESSON CARD ── */
.lesson-card{
  margin:0 14px 14px;background:var(--white);border-radius:var(--r);
  padding:16px;box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.04);
}
.lc-title{font-size:12px;font-weight:700;color:var(--mid);margin-bottom:12px;letter-spacing:0.04em;text-transform:uppercase;}
.lc-bar-wrap{background:var(--cream2);border-radius:10px;height:10px;margin-bottom:8px;overflow:hidden;}
.lc-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--g2),var(--g3));transition:width 0.6s ease;}
.lc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.lc-stat{text-align:center;padding:10px 6px;background:var(--cream);border-radius:12px;}
.lc-n{font-family:'Inter',sans-serif;font-size:20px;font-weight:700;}
.lc-l{font-size:10px;color:var(--mid);margin-top:3px;}

/* ── SECTION ── */
.sec{padding:16px 16px 0;}
.sec-t{
  font-size:11px;font-weight:700;color:var(--mid);letter-spacing:0.07em;
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;justify-content:space-between;
}
.sec-t span{font-size:11px;color:var(--g2);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;background:var(--gp);padding:3px 10px;border-radius:20px;}

/* ── FEEDBACK CARDS ── */
.fb-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:12px;border:1px solid rgba(0,0,0,0.04);}
.fb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fb-date{background:var(--gp);color:var(--g2);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.chip{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;}
.cg{background:var(--gp);color:var(--g2);}
.cb{background:var(--blue-bg);color:var(--blue);}
.fb-note{font-size:13px;line-height:1.75;color:var(--stone);}
.fb-next{margin-top:8px;padding:10px 12px;background:var(--gp);border-radius:12px;font-size:12px;color:var(--g2);font-weight:500;}

/* ── COMMENT ── */
.cmt-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:12px;border:1px solid rgba(0,0,0,0.04);}
.cmt-input{width:100%;padding:11px 13px;border:1.5px solid rgba(0,0,0,0.09);border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);resize:none;transition:border-color 0.2s;}
.cmt-input:focus{outline:none;border-color:var(--g2);}
.cmt-reply{background:var(--gp);border-radius:12px;padding:10px 13px;margin-top:8px;font-size:12px;color:var(--g2);line-height:1.65;}

/* ── BOOKING ── */
.cls-card{
  background:var(--white);border-radius:var(--r);padding:14px 16px;
  box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:12px;
  margin-bottom:10px;border:1px solid rgba(0,0,0,0.04);
}
.ct{min-width:46px;text-align:center;background:var(--gp);border-radius:10px;padding:8px 4px;}
.ct-t{font-size:12px;font-weight:700;color:var(--g2);font-family:'Inter',sans-serif;}
.ct-s{font-size:10px;color:var(--gl);}
.btn-book{padding:8px 14px;background:linear-gradient(135deg,var(--g2),var(--g3));color:white;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.btn-booked{background:var(--gp);color:var(--g2);border:1px solid var(--gl);}

/* ── MUSCLE ── */
.muscle-wrap{display:flex;gap:16px;justify-content:center;margin-bottom:16px;padding:16px;background:var(--white);border-radius:var(--r);box-shadow:var(--shadow-sm);border:1px solid rgba(0,0,0,0.04);}
.muscle-part{cursor:pointer;transition:opacity 0.2s;}
.muscle-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.ml-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid);}
.ml-dot{width:10px;height:10px;border-radius:50%;}
.week-chart{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;border:1px solid rgba(0,0,0,0.04);}
.wc-bars{display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:6px;}
.wc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.wc-bar{width:100%;border-radius:5px 5px 0 0;background:var(--gp2);transition:height 0.5s;}
.wc-bar.active{background:linear-gradient(180deg,var(--g3),var(--g2));}
.wc-label{font-size:10px;color:var(--mid);}

/* ── DIET ── */
.diet-upload{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;border:1px solid rgba(0,0,0,0.04);}
.upload-area{
  border:2px dashed var(--gl);border-radius:14px;padding:28px 16px;
  text-align:center;cursor:pointer;transition:all 0.2s;display:block;
}
.upload-area:hover,.upload-area:active{background:var(--gp);border-color:var(--g2);}
.diet-history{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);margin-bottom:10px;border:1px solid rgba(0,0,0,0.04);}
.diet-img{width:100%;height:140px;object-fit:cover;border-radius:12px;margin-bottom:10px;}

/* ── HOMETRAINING ── */
.ht-tabs{display:flex;background:var(--white);border-radius:14px;padding:4px;box-shadow:var(--shadow-sm);margin-bottom:14px;border:1px solid rgba(0,0,0,0.04);}
.ht-tab{flex:1;padding:9px 4px;border:none;border-radius:11px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--mid);transition:all 0.2s;}
.ht-tab.active{background:linear-gradient(135deg,var(--g2),var(--g3));color:white;font-weight:700;}
.ht-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;transition:transform 0.15s;border:1px solid rgba(0,0,0,0.04);}
.ht-card:active{transform:scale(0.985);}
.tag-g{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;background:var(--gp);color:var(--g2);}
.tag-t{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;background:var(--blue-bg);color:var(--blue);}
.tag-l{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:500;background:#FFF3E0;color:#D07030;}

/* ── COLUMN ── */
.col-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:10px;cursor:pointer;border:1px solid rgba(0,0,0,0.04);transition:transform 0.15s;}
.col-card:active{transform:scale(0.985);}
.col-tag-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;background:var(--gp);color:var(--g2);margin-bottom:8px;}

/* ── TIMER ── */
.timer-card{background:linear-gradient(135deg,var(--g) 0%,var(--g2) 60%,var(--g3) 100%);border-radius:22px;padding:22px 18px;text-align:center;color:white;margin-bottom:16px;box-shadow:var(--shadow-md);}
.timer-d{font-family:'Inter',sans-serif;font-size:54px;font-weight:800;letter-spacing:0.05em;}
.timer-btns{display:flex;gap:10px;margin-top:16px;justify-content:center;}
.tb{padding:12px 24px;border-radius:12px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.tb-s{background:white;color:var(--g2);}
.tb-r{background:rgba(255,255,255,0.15);color:white;border:1px solid rgba(255,255,255,0.2);}

/* ── FORMS ── */
.fi{width:100%;padding:12px 14px;border:1.5px solid rgba(0,0,0,0.09);border-radius:var(--r-sm);font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--stone);transition:border-color 0.2s,box-shadow 0.2s;}
.fi:focus{outline:none;border-color:var(--g2);box-shadow:0 0 0 3px rgba(42,122,90,0.1);}
.btn-f{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2) 0%,var(--g3) 100%);color:white;border:none;border-radius:var(--r-sm);font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;box-shadow:0 4px 14px rgba(42,122,90,0.35);}
.btn-o{width:100%;padding:12px;background:transparent;color:var(--g2);border:1.5px solid var(--g2);border-radius:var(--r-sm);font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);}
.modal-ov.open{display:flex;}
.modal{background:var(--white);border-radius:28px 28px 0 0;padding:22px 18px 48px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;}
.mh{width:40px;height:4px;border-radius:2px;background:rgba(0,0,0,0.12);margin:0 auto 20px;}
.mt{font-size:18px;font-weight:700;margin-bottom:16px;letter-spacing:-0.3px;}

/* ── AVATAR PICKER (profile edit) ── */
.av-pick-wrap{margin-bottom:16px;}
.av-preview-row{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.av-preview{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;background:var(--gp2);box-shadow:var(--shadow);overflow:hidden;border:3px solid var(--gp);flex-shrink:0;}
.av-preview img{width:100%;height:100%;object-fit:cover;}
.av-pick-btns{display:flex;flex-direction:column;gap:7px;flex:1;}
.av-pick-btn{padding:9px 14px;border-radius:10px;border:1.5px solid rgba(0,0,0,0.09);background:var(--white);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:600;cursor:pointer;color:var(--stone2);text-align:left;}
.emoji-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.eg-btn{width:100%;aspect-ratio:1;border:none;background:var(--cream2);border-radius:10px;font-size:22px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.eg-btn.selected{background:var(--gp2);transform:scale(1.15);box-shadow:0 2px 8px rgba(42,122,90,0.3);}

/* ── TOAST ── */
.toast{position:fixed;bottom:92px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--stone2);color:white;padding:12px 20px;border-radius:14px;font-size:12px;font-weight:500;white-space:nowrap;opacity:0;transition:all 0.25s;z-index:300;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:36px 16px;color:var(--mid);}
.status-pill{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;}
.pill-done{background:var(--gp);color:var(--g2);}
.pill-wait{background:#FFF3E0;color:#D07030;}
</style>
</head>
<body>

<!-- ── 온보딩 ── -->
<div id="onboardScreen">
  <img class="ob-logo" src="logo.png" alt="뉴런필라테스">
  <div class="ob-name">뉴런필라테스</div>
  <div class="ob-sub">Neuron Pilates Studio<br>강사 피드백 · 레슨 기록 · 홈트레이닝</div>

  <div class="ob-card">
    <!-- 아바타 선택 -->
    <div class="ob-av-section">
      <label class="ob-label">나의 아바타</label>
      <div class="ob-av-preview-row">
        <div class="ob-av-preview" id="obAvPreview">🧘</div>
        <div class="ob-av-btns">
          <button class="ob-av-btn" onclick="toggleObEmojiGrid()">😊 이모지 선택</button>
          <label class="ob-av-btn" for="obAvatarFile" style="cursor:pointer;">📷 사진 업로드</label>
          <input type="file" id="obAvatarFile" accept="image/*" style="display:none;" onchange="handleObAvatarFile(event)">
        </div>
      </div>
      <div id="obEmojiGrid" style="display:none;">
        <div class="ob-emoji-grid" id="obEmojiGridInner"></div>
      </div>
      <input type="hidden" id="obAvatarVal" value="🧘">
    </div>

    <div>
      <label class="ob-label">내 이름</label>
      <input class="ob-input" id="inputName" placeholder="예: 이소연">
    </div>
    <div>
      <label class="ob-label">수강 클래스</label>
      <select class="ob-input" id="inputClass" style="margin-bottom:20px;">
        <option>기초 필라테스</option><option>코어 강화</option><option>바디밸런스</option><option>저녁 플로우</option>
      </select>
    </div>
    <button class="ob-btn" onclick="startApp()">시작하기 →</button>
  </div>
</div>

<!-- ── 앱 본체 ── -->
<div id="appScreen" style="display:none;">
  <div class="hdr">
    <img class="hdr-logo" src="logo.png" alt="">
    <div style="flex:1;">
      <div style="font-size:15px;font-weight:700;letter-spacing:-0.3px;" id="hdrName"></div>
      <div style="font-size:10px;opacity:0.75;" id="hdrClass"></div>
    </div>
    <div class="hdr-av" id="hdrAvatar" onclick="openModal('profileModal')">🧘</div>
  </div>

  <div class="content">
    <!-- 홈 -->

const firebaseConfig = {
  apiKey: "AIzaSyAJslxytJtYOK-vVuIU8S8BCAa77CNatp4",
  authDomain: "neuron-pilates.firebaseapp.com",
  projectId: "neuron-pilates",
  storageBucket: "neuron-pilates.firebasestorage.app",
  messagingSenderId: "574648858795",
  appId: "1:574648858795:web:235c484775c74187115fee"
};
const app = initializeApp(firebaseConfig);

const DAY=['일','월','화','수','목','금','토'];

let timerInterval=null, timerSecs=0, timerRunning=false;
// 아바타: hidden input은 대용량 base64를 잘라내므로 JS 변수에 저장
let _obAvatar = '🧘';   // 온보딩 화면용
let _profAvatar = null; // 프로필 편집용

const AVATAR_EMOJIS = ['🧘','💪','🌿','⭐','🌸','🦋','🌺','🌻','👑','💎','🌙','☀️','🌊','🦩','🌱','🍃','🎯','✨','🔥','🏆','🌈','🦚','🌷','🍀'];

// ── AVATAR ──
function buildEmojiGrid(gridId, hiddenId, previewId) {
  const inner = document.getElementById(gridId);
  if(!inner) return;
  inner.innerHTML = AVATAR_EMOJIS.map(e=>`<button class="eg-btn" data-em="${e}">${e}</button>`).join('');
  inner.querySelectorAll('.eg-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      inner.querySelectorAll('.eg-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      _profAvatar = btn.dataset.em; // JS 변수에 저장
      const prev=document.getElementById(previewId);
      prev.innerHTML=btn.dataset.em;
      prev.style.fontSize='30px';
    });
  });
}
function buildObEmojiGrid() {
  const inner = document.getElementById('obEmojiGridInner');
  if(!inner||inner.children.length) return;
  inner.innerHTML = AVATAR_EMOJIS.map(e=>`<button class="ob-eg-btn" data-em="${e}">${e}</button>`).join('');
  inner.querySelectorAll('.ob-eg-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      inner.querySelectorAll('.ob-eg-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      _obAvatar = btn.dataset.em;
      const prev=document.getElementById('obAvPreview');
      prev.innerHTML=btn.dataset.em;
      prev.style.fontSize='';
    });
  });
}
window.toggleObEmojiGrid=function(){
  const grid=document.getElementById('obEmojiGrid');
  const show=grid.style.display==='none';
  grid.style.display=show?'block':'none';
  if(show)buildObEmojiGrid();
};
window.handleObAvatarFile=function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _obAvatar=ev.target.result; // JS 변수에 저장 (hidden input은 truncate됨)
    const prev=document.getElementById('obAvPreview');
    prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  };
  reader.readAsDataURL(file);
};
window.toggleProfEmojiGrid=function(){
  const grid=document.getElementById('profEmojiGrid');
  const show=grid.style.display==='none';
  grid.style.display=show?'block':'none';
  if(show)buildEmojiGrid('profEmojiGridInner','profAvatarVal','profAvPreview');
};
window.handleProfAvatarFile=function(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _profAvatar=ev.target.result; // JS 변수에 저장
    const prev=document.getElementById('profAvPreview');
    prev.innerHTML=`<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  };
  reader.readAsDataURL(file);
};
function setHdrAvatar(avatar) {
  const el = document.getElementById('hdrAvatar');
  if(!el) return;
  const isUrl = avatar && (avatar.startsWith('http')||avatar.startsWith('data'));
  if(isUrl) {
    el.innerHTML=`<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
  } else {
    el.innerHTML = avatar||'🧘';
    el.style.fontSize='18px';
  }
}

function saveLocal(){localStorage.setItem('np_member_v3',JSON.stringify(mData));}

// ── ONBOARDING ──
window.startApp = async function(){
  const name=document.getElementById('inputName').value.trim();
  if(!name){showToast('이름을 입력해 주세요');return;}
  mData.name=name;mData.class=document.getElementById('inputClass').value;
  mData.avatar=_obAvatar||'🧘'; // JS 변수에서 읽음
  mData.bookings=mData.bookings||[];
  saveLocal();
  const snap=await getDocs(query(collection(db,'members'),where('name','==',name)));
  if(!snap.empty){memberId=snap.docs[0].id;mData.memberId=memberId;saveLocal();}
  initApp();
};

function initApp(){
  document.getElementById('onboardScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const h=today.getHours();
  const greet=h<12?'좋은 아침이에요 ☀️':h<18?'안녕하세요 👋':'좋은 저녁이에요 🌙';
  document.getElementById('hdrName').textContent=mData.name+'님 '+greet;
  document.getElementById('hdrClass').textContent='뉴런필라테스 · '+mData.class;
  document.getElementById('myClassLbl').textContent=mData.class;
  setHdrAvatar(mData.avatar);
  memberId=mData.memberId||null;
  renderHome();renderHt('beginner');
}

// ── PROFILE MODAL ──
window.openModal=function(id){
  if(id==='profileModal'){
    const av=mData.avatar||'🧘';
    _profAvatar=av; // 현재 아바타로 초기화
    const prev=document.getElementById('profAvPreview');
    const isUrl=av.startsWith('http')||av.startsWith('data');
    if(isUrl){prev.innerHTML=`<img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;}
    else{prev.innerHTML=av;prev.style.fontSize='30px';}
    document.getElementById('profName').value=mData.name||'';
    const sel=document.getElementById('profClass');
    for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===mData.class){sel.selectedIndex=i;break;}}
    document.getElementById('profEmojiGrid').style.display='none';
  }
  document.getElementById(id).classList.add('open');
};
window.closeModal=function(id){document.getElementById(id).classList.remove('open');};
window.saveProfile=function(){
  const name=document.getElementById('profName').value.trim();
  if(!name){showToast('이름을 입력하세요');return;}
  mData.name=name;mData.class=document.getElementById('profClass').value;
  if(_profAvatar)mData.avatar=_profAvatar; // JS 변수에서 읽음
  // base64 이미지는 localStorage 용량(~5MB)을 초과할 수 있으므로 try/catch
  try{saveLocal();}
  catch(e){
    // 용량 초과 시 아바타만 이모지로 폴백
    const fallback=AVATAR_EMOJIS[0];
    mData.avatar=fallback;_profAvatar=fallback;
    saveLocal();
    showToast('사진 용량이 커서 이모지로 저장됩니다');
  }
  setHdrAvatar(mData.avatar);
  document.getElementById('hdrName').textContent=mData.name+'님';
  document.getElementById('hdrClass').textContent='뉴런필라테스 · '+mData.class;
  closeModal('profileModal');
  showToast('프로필이 업데이트되었습니다 ✓');
};

  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));

  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('t-'+t).classList.add('active');
  if(t==='home')renderHome();
  else if(t==='feedback')renderFbFull();
  else if(t==='comment')renderComments();
  else if(t==='booking')renderBooking();
  else if(t==='muscle')renderMuscle();
  else if(t==='diet')renderDietHistory();
  else if(t==='column')renderColumns();
};

async function getFbs(){
  if(!memberId)return[];
  const snap=await getDocs(query(collection(db,'feedbacks'),where('memberId','==',memberId)));
  return snap.docs.map(d=>d.data()).sort((a,b)=>b.date.localeCompare(a.date));
}

          <rect x="33" y="142" width="20" height="70" rx="8" fill="${getColor('leg')}" stroke="#C8C0B0" stroke-width="1.5"/>
          <rect x="57" y="142" width="20" height="70" rx="8" fill="${getColor('leg')}" stroke="#C8C0B0" stroke-width="1.5"/>
        </svg>
      </div>
      <div>
        <div style="font-size:9px;color:var(--mid);text-align:center;margin-bottom:2px;">뒷면</div>
        <svg width="70" height="150" viewBox="0 0 110 230" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="55" cy="18" rx="18" ry="18" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5"/>
          <rect x="32" y="44" width="46" height="60" rx="8" fill="${getColor('back')}" stroke="#C8C0B0" stroke-width="1.5"/>
          <rect x="35" y="100" width="40" height="40" rx="6" fill="${getColor('glute')}" stroke="#C8C0B0" stroke-width="1.5"/>

          <rect x="57" y="142" width="20" height="70" rx="8" fill="${getColor('leg')}" stroke="#C8C0B0" stroke-width="1.5"/>

async function renderHome(){
  const fbs=await getFbs();
  let p=0,a=0;
  if(memberId){
    const snap=await getDocs(query(collection(db,'attendance'),where('memberId','==',memberId)));
    snap.docs.forEach(d=>{if(d.data().status==='present')p++;else a++;});
  }
  const t=p+a,rate=t?Math.round(p/t*100):0;
  document.getElementById('heroRate').textContent=rate+'%';
  document.getElementById('heroSub').textContent=`총 ${t}회 중 ${p}회 출석`;
  document.getElementById('heroP').textContent=p;
  document.getElementById('heroA').textContent=a;
  document.getElementById('heroT').textContent=p;

    const mSnap=await getDoc(doc(db,'members',memberId));

      const m=mSnap.data(),total=m.lessonTotal||0,used=m.lessonUsed||0,remain=total-used,pct=total?Math.round(used/total*100):0;
      document.getElementById('lessonCard').innerHTML=`

          <div class="lc-stat"><div class="lc-n">${total}</div><div class="lc-l">총 횟수</div></div>
          <div class="lc-stat"><div class="lc-n">${used}</div><div class="lc-l">이용</div></div>
          <div class="lc-stat"><div class="lc-n" style="color:${remain<=2?'var(--red)':'var(--g2)'};">${remain}</div><div class="lc-l">잔여</div></div>
        </div>

    }

  document.getElementById('homeTodayHt').innerHTML=`
    <div class="ht-card" onclick="openHtModal(0,'beginner')">
      <div style="display:flex;align-items:center;gap:12px;">

  if(!cmt){showToast('코멘트를 입력하세요');return;}
  if(!memberId){showToast('강사에게 회원 등록을 요청해 주세요');return;}
  await addDoc(collection(db,'comments'),{memberId,memberName:mData.name,comment:cmt,createdAt:new Date().toISOString(),reply:''});
  document.getElementById('newComment').value='';
  renderComments();showToast('코멘트가 전송되었습니다 ✓');
};

async function renderBooking(){
  const snap=await getDocs(collection(db,'classes'));
  const classes=snap.docs.map(d=>({id:d.id,...d.data()}));
  const bookings=mData.bookings||[];
  document.getElementById('bookingList').innerHTML=classes.map(c=>{
    const booked=bookings.includes(c.id);
    return`<div class="cls-card">
      <div class="ct"><div class="ct-t">${c.time}</div><div class="ct-s">${c.day}요일</div></div>
      <div style="flex:1;"><div style="font-size:13px;font-weight:600;">${c.name}</div><div style="font-size:11px;color:var(--mid);margin-top:2px;">${c.level} · 최대 ${c.max}명</div>
        <div style="font-size:10px;margin-top:3px;color:${booked?'var(--g2)':'var(--mid)'};">${booked?'✓ 예약 완료':'예약 가능'}</div>
      </div>
      <button class="btn-book ${booked?'btn-booked':''}" onclick="toggleBook('${c.id}')">${booked?'취소':'예약'}</button>
    </div>`;
  }).join('');
}
window.toggleBook=function(id){
  if(!mData.bookings)mData.bookings=[];
  if(mData.bookings.includes(id)){mData.bookings=mData.bookings.filter(b=>b!==id);showToast('예약이 취소되었습니다');}
  else{mData.bookings.push(id);showToast('예약 완료! 🌿');}
  saveLocal();renderBooking();
};

// ★ Gemini API 키를 아래에 입력하세요 (Google AI Studio: https://aistudio.google.com/app/apikey)
const GEMINI_API_KEY = 'AIzaSy여기에본인키입력';

function extractJson(text) {
  // ```json ... ``` 또는 ``` ... ``` 블록 제거
  let clean = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  // 중괄호 블록만 추출 (앞뒤 불필요한 텍스트 제거)
  const match = clean.match(/\{[\s\S]*\}/);
  if(match) clean = match[0];
  return JSON.parse(clean);
}

window.handleDietUpload=function(e){
  const file=e.target.files[0];if(!file)return;
  dietFileData=file;
  const reader=new FileReader();
  reader.onload=async ev=>{
    const dataUrl=ev.target.result;
    const base64=dataUrl.split(',')[1];
    const mimeType=file.type||'image/jpeg';

    document.getElementById('dietPreview').innerHTML=`
      <img src="${dataUrl}" style="width:100%;border-radius:12px;max-height:220px;object-fit:cover;margin-bottom:12px;">
      <div id="aiCalResult" style="background:var(--cream);border-radius:14px;padding:14px;font-size:13px;color:var(--mid);display:flex;align-items:center;gap:10px;">
        <span style="font-size:20px;animation:spin 1s linear infinite;display:inline-block;">⏳</span>
        <span>AI가 음식을 분석하고 있어요...</span>
      </div>`;
    document.getElementById('dietSubmitBtn').style.display='block';

    // API 키가 기본값이면 분석 스킵
    if(GEMINI_API_KEY.includes('여기에본인키입력')){
      aiKcal=null;
      document.getElementById('aiCalResult').innerHTML=`
        <div style="font-size:12px;color:var(--mid);">
          ⚠ Gemini API 키를 설정해야 자동 분석이 됩니다.<br>
          <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--g2);">API 키 발급받기 →</a>
        </div>`;
      return;
    }

    try{
      const res=await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
        {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({
            contents:[{parts:[
              {inline_data:{mime_type:mimeType, data:base64}},
              {text:'이 식단 사진에 있는 음식들을 분석해서 칼로리를 추정해주세요. 반드시 JSON 형식으로만 답하세요. 다른 설명 없이 순수 JSON만. 형식: {"foods":["음식명1","음식명2"],"totalKcal":숫자,"breakdown":[{"name":"음식명","kcal":숫자,"amount":"1인분"}]}'}
            ]}],
            generationConfig:{temperature:0.2,maxOutputTokens:1024}
          })
        }
      );

      if(!res.ok){
        const errBody=await res.text();
        throw new Error(`HTTP ${res.status}: ${errBody}`);
      }

      const data=await res.json();

      // 응답 구조 검증
      if(data.error){throw new Error(data.error.message||JSON.stringify(data.error));}
      if(!data.candidates||!data.candidates[0]){throw new Error('응답에 candidates가 없습니다.');}

      const rawText=data.candidates[0].content.parts[0].text;
      const json=extractJson(rawText);

      aiKcal=json.totalKcal;
      document.getElementById('aiCalResult').innerHTML=`
        <div style="margin-bottom:8px;display:flex;align-items:center;gap:6px;">
          <span style="font-size:16px;">🤖</span>
          <span style="font-size:12px;font-weight:700;color:var(--g2);">AI 칼로리 분석 완료</span>
        </div>
        <div style="font-family:'Inter',sans-serif;font-size:28px;font-weight:800;color:var(--stone);margin-bottom:10px;">${json.totalKcal} <span style="font-size:14px;font-weight:500;color:var(--mid);">kcal</span></div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;">
          ${(json.breakdown||[]).map(b=>`
            <div style="background:var(--white);padding:5px 10px;border-radius:10px;font-size:11px;border:1px solid rgba(0,0,0,0.06);">
              <span>${b.name}</span>
              ${b.amount?`<span style="color:var(--mid);"> · ${b.amount}</span>`:''}
              <b style="color:var(--g2);margin-left:4px;">${b.kcal}kcal</b>
            </div>`).join('')}
        </div>
        <div style="margin-top:10px;font-size:11px;color:var(--mid);">
          🍽 인식된 음식: ${(json.foods||[]).join(', ')}
        </div>`;
    }catch(err){
      aiKcal=null;
      console.error('Gemini 오류:', err);
      document.getElementById('aiCalResult').innerHTML=`
        <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:4px;">⚠ AI 분석 실패</div>
        <div style="font-size:11px;color:var(--mid);word-break:break-all;">${err.message}</div>
        <div style="font-size:11px;color:var(--mid);margin-top:6px;">API 키를 확인하거나 수동으로 칼로리를 입력해 주세요.</div>`;
    }
  };
  reader.readAsDataURL(file);
};
window.submitDiet=async function(){
  if(!dietFileData){showToast('사진을 선택해 주세요');return;}
  showToast('업로드 중...');
  try{
    const storageRef=ref(storage,`diets/${mData.name}_${todayKey}_${Date.now()}`);
    await uploadBytes(storageRef,dietFileData);
    const url=await getDownloadURL(storageRef);
    await addDoc(collection(db,'diets'),{memberName:mData.name,memberId:memberId||'',date:todayKey,imageUrl:url,status:'pending',createdAt:new Date().toISOString(),kcal:aiKcal||null});
    document.getElementById('dietPreview').innerHTML='';
    document.getElementById('dietSubmitBtn').style.display='none';
    document.getElementById('dietFile').value='';
    dietFileData=null;renderDietHistory();
    showToast('식단 업로드 완료! 강사 코멘트를 기다려 주세요 🌿');
  }catch(e){showToast('업로드 실패. Storage 설정을 확인해 주세요.');}
};
window.deleteDiet=async function(id,imageUrl){
  if(!confirm('이 식단 기록을 삭제하시겠습니까?'))return;
  try{if(imageUrl){const imgRef=ref(storage,imageUrl);await deleteObject(imgRef).catch(()=>{});}
  await deleteDoc(doc(db,'diets',id));renderDietHistory();showToast('식단 기록이 삭제되었습니다');}
  catch(e){showToast('삭제 중 오류가 발생했습니다');}
};
async function renderDietHistory(){
  const snap=await getDocs(query(collection(db,'diets'),where('memberName','==',mData.name)));
  const container=document.getElementById('dietHistoryList');
  if(snap.empty){container.innerHTML='<div style="font-size:12px;color:var(--mid);">아직 업로드한 식단이 없습니다</div>';return;}
  const docs=snap.docs.sort((a,b)=>b.data().date.localeCompare(a.data().date));
  container.innerHTML='';
  docs.forEach(d=>{
    const dt=d.data();
    const card=document.createElement('div');
    card.className='diet-history';
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;align-items:center;">
        <span style="font-size:12px;font-weight:600;">${dt.date}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="status-pill ${dt.status==='done'?'pill-done':'pill-wait'}">${dt.status==='done'?'코멘트 완료':'대기중'}</span>
          <button class="del-diet-btn" style="padding:4px 10px;background:var(--red-bg);color:var(--red);border:none;border-radius:8px;font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;">삭제</button>
        </div>
      </div>
      ${dt.imageUrl?`<img class="diet-img" src="${dt.imageUrl}" alt="식단">`:''}
      ${dt.kcal?`<div style="font-size:12px;color:var(--g2);font-weight:600;margin-bottom:5px;">예상 칼로리: ${dt.kcal} kcal</div>`:''}
      ${dt.comment?`<div style="font-size:12px;line-height:1.65;margin-bottom:6px;">${dt.comment}</div>`:''}
      ${dt.suggest?`<div style="font-size:11px;color:var(--g2);">→ ${dt.suggest}</div>`:''}`;
    card.querySelector('.del-diet-btn').addEventListener('click',()=>deleteDiet(d.id,dt.imageUrl||''));
    container.appendChild(card);
  });
}

window.selHtCat=function(cat,el){document.querySelectorAll('.ht-tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderHt(cat);};
function renderHt(cat){
  const container=document.getElementById('htList');container.innerHTML='';
  (htData[cat]||[]).forEach((ex,i)=>{
    const card=document.createElement('div');card.className='ht-card';
    card.innerHTML=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <span style="font-size:34px;">${ex.emoji}</span>
      <div><div style="font-size:13px;font-weight:700;">${ex.title}</div><div style="font-size:11px;color:var(--mid);margin-top:2px;">${ex.desc.slice(0,35)}...</div></div>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">${ex.tags.map(t=>`<span class="tag-g">${t}</span>`).join('')}<span class="tag-t">⏱ ${ex.time}</span><span class="tag-l">${ex.level}</span></div>`;
    card.addEventListener('click',()=>openHtModal(i,cat));
    container.appendChild(card);
  });
}
window.openHtModal=function(i,cat){
  const ex=htData[cat][i];
  document.getElementById('htMT').textContent=ex.emoji+' '+ex.title;
  document.getElementById('htMB').innerHTML=`
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">${ex.tags.map(t=>`<span class="tag-g">${t}</span>`).join('')}<span class="tag-t">⏱ ${ex.time}</span><span class="tag-l">${ex.level}</span></div>
    <p style="font-size:13px;color:var(--mid);line-height:1.7;margin-bottom:12px;">${ex.desc}</p>
    <div style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:8px;letter-spacing:0.04em;">운동 방법</div>
    <div style="font-size:13px;line-height:2;">${ex.steps.join('<br>')}</div>
    <button class="btn-f" style="margin-top:16px;" onclick="closeModal('htModal');switchTab('hometraining');toggleTimer();">▶ 타이머 시작</button>`;
  openModal('htModal');
};

// ── TIMER ──
window.toggleTimer=function(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLbl').textContent='일시정지됨';}
  else{timerRunning=true;document.getElementById('timerBtn').textContent='⏸ 정지';document.getElementById('timerLbl').textContent='운동 중 🔥';
    timerInterval=setInterval(()=>{timerSecs++;const m=Math.floor(timerSecs/60),s=timerSecs%60;document.getElementById('timerD').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');},1000);}
};
window.resetTimer=function(){clearInterval(timerInterval);timerRunning=false;timerSecs=0;document.getElementById('timerD').textContent='00:00';document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLbl').textContent='운동 타이머';};

// ── COLUMNS ──
async function renderColumns(){
  const snap=await getDocs(query(collection(db,'columns'),orderBy('createdAt','desc')));
  document.getElementById('colList').innerHTML=snap.empty?'<div class="empty"><div style="font-size:44px;">📖</div><div style="font-size:13px;margin-top:10px;">등록된 칼럼이 없습니다</div></div>':
    snap.docs.map(d=>{const dt=d.data();return`
    <div class="col-card" onclick="openColDetail('${d.id}','${encodeURIComponent(dt.title)}','${encodeURIComponent(dt.content)}','${dt.category}')">
      <span class="col-tag-badge">${dt.category}</span>
      <div style="font-size:14px;font-weight:700;margin-bottom:6px;letter-spacing:-0.2px;">${dt.title}</div>
      <div style="font-size:12px;color:var(--mid);line-height:1.55;">${dt.content.slice(0,60)}...</div>
    </div>`;}).join('');
}
window.openColDetail=function(id,title,content,cat){
  document.getElementById('colMT').textContent=decodeURIComponent(title);
  document.getElementById('colMB').innerHTML=`<div style="margin-bottom:10px;"><span class="col-tag-badge">${cat}</span></div><div style="white-space:pre-wrap;">${decodeURIComponent(content)}</div>`;
  openModal('colModal');
};

// ── MODAL ──
document.querySelectorAll('.modal-ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
window.showToast=showToast;

if(mData.name)initApp();
