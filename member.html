<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2A7A5A">
<title>뉴런필라테스 회원</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{--g:#1A5C3A;--g2:#2A7A5A;--gl:#7ECBA0;--gp:#E8F5EE;--stone:#2E2E2B;--mid:#6B6B68;--cream:#F7F5F1;--white:#FDFCFA;--red:#D9634E;--blue:#5B8DB8;--gold:#C4A055;--shadow:rgba(26,92,58,0.12);--r:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--stone);min-height:100vh;max-width:430px;margin:0 auto;}
.hdr{background:linear-gradient(135deg,var(--g),var(--g2));color:white;padding:14px 18px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;}
.hdr-logo{width:30px;height:30px;object-fit:contain;}
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid rgba(0,0,0,0.08);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nb{flex:1;padding:9px 2px 7px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;font-family:'Noto Sans KR',sans-serif;color:var(--mid);transition:color 0.2s;font-size:9px;font-weight:500;}
.nb.active{color:var(--g2);}
.ni{font-size:18px;}
.content{padding:0 0 80px;}
.panel{display:none;}
.panel.active{display:block;}
.sec{padding:14px 14px 0;}
.sec-t{font-size:11px;font-weight:700;color:var(--mid);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.sec-t span{font-size:11px;color:var(--g2);font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer;}
/* 히어로 */
.hero{margin:14px;background:linear-gradient(135deg,var(--stone),#3D3D3A);border-radius:20px;padding:18px;color:white;}
.hero-lbl{font-size:11px;opacity:0.65;margin-bottom:3px;}
.hero-val{font-size:34px;font-weight:700;line-height:1;}
.hero-sub{font-size:11px;opacity:0.65;margin-top:5px;}
.hero-row{display:flex;margin-top:14px;}
.hs{flex:1;text-align:center;}
.hs-n{font-size:20px;font-weight:700;}
.hs-l{font-size:10px;opacity:0.6;margin-top:2px;}
.hd{width:1px;background:rgba(255,255,255,0.15);}
/* 레슨 횟수 카드 */
.lesson-card{margin:14px;background:var(--white);border-radius:var(--r);padding:16px;box-shadow:0 2px 12px var(--shadow);}
.lc-title{font-size:13px;font-weight:700;color:var(--mid);margin-bottom:12px;}
.lc-bar-wrap{background:var(--cream);border-radius:10px;height:12px;margin-bottom:8px;overflow:hidden;}
.lc-bar{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--g),var(--g2));transition:width 0.5s;}
.lc-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.lc-stat{text-align:center;padding:10px 6px;background:var(--cream);border-radius:12px;}
.lc-n{font-size:20px;font-weight:700;}
.lc-l{font-size:10px;color:var(--mid);margin-top:2px;}
/* 피드백 카드 */
.fb-card{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:0 2px 12px var(--shadow);margin-bottom:12px;}
.fb-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fb-date{background:var(--gp);color:var(--g2);padding:3px 9px;border-radius:8px;font-size:10px;font-weight:600;}
.chip-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.chip{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:500;}
.cg{background:var(--gp);color:var(--g2);}
.cb{background:#E8EEF8;color:var(--blue);}
.fb-note{font-size:13px;line-height:1.75;color:var(--stone);}
.fb-next{margin-top:8px;padding:9px 11px;background:var(--gp);border-radius:10px;font-size:12px;color:var(--g2);}
/* 코멘트 */
.cmt-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;}
.cmt-input{width:100%;padding:10px 12px;border:1.5px solid rgba(0,0,0,0.10);border-radius:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);resize:none;}
.cmt-input:focus{outline:none;border-color:var(--g2);}
.cmt-reply{background:var(--gp);border-radius:10px;padding:10px 12px;margin-top:8px;font-size:12px;color:var(--g2);line-height:1.6;}
/* 예약 */
.cls-card{background:var(--white);border-radius:var(--r);padding:14px 16px;box-shadow:0 2px 10px var(--shadow);display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.ct{min-width:46px;text-align:center;background:var(--gp);border-radius:10px;padding:7px 4px;}
.ct-t{font-size:12px;font-weight:700;color:var(--g2);}
.ct-s{font-size:10px;color:var(--gl);}
.btn-book{padding:7px 13px;background:var(--g2);color:white;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
.btn-booked{background:var(--gp);color:var(--g2);border:1px solid var(--gl);}
/* 근육 활성도 */
.muscle-wrap{display:flex;gap:16px;justify-content:center;margin-bottom:16px;padding:16px;background:var(--white);border-radius:var(--r);box-shadow:0 2px 10px var(--shadow);}
.muscle-part{cursor:pointer;transition:opacity 0.2s;}
.muscle-part:hover{opacity:0.8;}
.muscle-legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.ml-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mid);}
.ml-dot{width:10px;height:10px;border-radius:50%;}
.week-chart{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);margin-bottom:14px;}
.wc-bars{display:flex;gap:6px;align-items:flex-end;height:80px;margin-bottom:6px;}
.wc-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.wc-bar{width:100%;border-radius:4px 4px 0 0;background:var(--gp);transition:height 0.4s;}
.wc-bar.active{background:var(--g2);}
.wc-label{font-size:10px;color:var(--mid);}
/* 식단 */
.diet-upload{background:var(--white);border-radius:var(--r);padding:16px;box-shadow:0 2px 10px var(--shadow);margin-bottom:12px;}
.upload-area{border:2px dashed var(--gl);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:background 0.2s;}
.upload-area:hover{background:var(--gp);}
.diet-history{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;}
.diet-img{width:100%;height:140px;object-fit:cover;border-radius:10px;margin-bottom:10px;}
/* 홈트 */
.ht-tabs{display:flex;gap:0;background:var(--white);border-radius:12px;padding:3px;box-shadow:0 2px 8px var(--shadow);margin-bottom:12px;}
.ht-tab{flex:1;padding:8px 4px;border:none;border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:var(--mid);transition:all 0.2s;}
.ht-tab.active{background:var(--g2);color:white;}
.ht-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;cursor:pointer;transition:transform 0.15s;}
.ht-card:active{transform:scale(0.98);}
.tag-g{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:500;background:var(--gp);color:var(--g2);}
.tag-t{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:500;background:#E8EEF8;color:var(--blue);}
.tag-l{padding:3px 8px;border-radius:8px;font-size:10px;font-weight:500;background:#FFF3E0;color:#D07030;}
/* 칼럼 */
.col-card{background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);margin-bottom:10px;cursor:pointer;}
.col-tag-badge{display:inline-block;padding:3px 9px;border-radius:8px;font-size:10px;font-weight:600;background:var(--gp);color:var(--g2);margin-bottom:7px;}
/* 타이머 */
.timer-card{background:linear-gradient(135deg,var(--g),var(--g2));border-radius:20px;padding:22px 18px;text-align:center;color:white;margin-bottom:14px;}
.timer-d{font-size:52px;font-weight:700;letter-spacing:0.05em;font-variant-numeric:tabular-nums;}
.timer-btns{display:flex;gap:10px;margin-top:14px;justify-content:center;}
.tb{padding:11px 22px;border-radius:12px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.tb-s{background:white;color:var(--g2);}
.tb-r{background:rgba(255,255,255,0.2);color:white;}
/* 온보딩 */
.onboard{padding:32px 20px;display:flex;flex-direction:column;align-items:center;}
.fi{width:100%;padding:11px 13px;border:1.5px solid rgba(0,0,0,0.10);border-radius:12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--stone);transition:border-color 0.2s;}
.fi:focus{outline:none;border-color:var(--g2);}
.btn-f{width:100%;padding:13px;background:var(--g2);color:white;border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}
.btn-o{width:100%;padding:11px;background:transparent;color:var(--g2);border:1.5px solid var(--g2);border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:22px 18px 44px;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;}
.mh{width:38px;height:4px;border-radius:2px;background:rgba(0,0,0,0.15);margin:0 auto 18px;}
.mt{font-size:17px;font-weight:700;margin-bottom:14px;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--stone);color:white;padding:11px 18px;border-radius:12px;font-size:12px;white-space:nowrap;opacity:0;transition:all 0.25s;z-index:300;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:32px 16px;color:var(--mid);}
</style>
</head>
<body>
<!-- 온보딩 -->
<div id="onboardScreen">
  <div class="onboard">
    <img src="logo.png" style="width:90px;height:90px;object-fit:contain;margin-bottom:14px;">
    <div style="font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;">뉴런필라테스<br>회원 앱</div>
    <div style="font-size:13px;color:var(--mid);text-align:center;margin-bottom:28px;line-height:1.6;">강사 피드백, 레슨 기록, 홈트레이닝,<br>식단 관리를 한 곳에서!</div>
    <div style="width:100%;max-width:320px;">
      <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:5px;display:block;">내 이름</label><input class="fi" id="inputName" placeholder="예: 이소연"></div>
      <div style="margin-bottom:12px;"><label style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:5px;display:block;">수강 클래스</label>
        <select class="fi" id="inputClass"><option>기초 필라테스</option><option>코어 강화</option><option>바디밸런스</option><option>저녁 플로우</option></select>
      </div>
      <button class="btn-f" onclick="startApp()">시작하기</button>
    </div>
  </div>
</div>

<!-- 앱 본체 -->
<div id="appScreen" style="display:none;">
  <div class="hdr">
    <img class="hdr-logo" src="logo.png" alt="">
    <div style="flex:1;"><div style="font-size:15px;font-weight:700;" id="hdrName"></div><div style="font-size:10px;opacity:0.8;" id="hdrClass"></div></div>
  </div>

  <div class="content">
    <!-- 홈 -->
    <div class="panel active" id="p-home">
      <div class="hero">
        <div class="hero-lbl">이번 달 출석률</div>
        <div class="hero-val" id="heroRate">-</div>
        <div class="hero-sub" id="heroSub"></div>
        <div class="hero-row">
          <div class="hs"><div class="hs-n" id="heroP">0</div><div class="hs-l">출석</div></div>
          <div class="hd"></div>
          <div class="hs"><div class="hs-n" id="heroA">0</div><div class="hs-l">결석</div></div>
          <div class="hd"></div>
          <div class="hs"><div class="hs-n" id="heroT">0</div><div class="hs-l">누적</div></div>
        </div>
      </div>
      <!-- 레슨 횟수 -->
      <div class="lesson-card" id="lessonCard"></div>
      <div class="sec">
        <div class="sec-t">최근 피드백 <span onclick="switchTab('feedback')">전체</span></div>
        <div id="homeFb"></div>
        <div class="sec-t" style="margin-top:4px;">오늘의 홈트 <span onclick="switchTab('hometraining')">전체</span></div>
        <div id="homeTodayHt"></div>
      </div>
    </div>

    <!-- 피드백 -->
    <div class="panel" id="p-feedback">
      <div class="sec">
        <div class="sec-t">강사 피드백</div>
        <div id="fbFull"></div>
      </div>
    </div>

    <!-- 레슨 코멘트 -->
    <div class="panel" id="p-comment">
      <div class="sec">
        <div class="sec-t">레슨 코멘트 & 답변</div>
        <div id="commentList"></div>
        <div style="margin-top:14px;">
          <div style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:6px;">강사에게 코멘트 남기기</div>
          <textarea class="cmt-input" id="newComment" rows="3" placeholder="수업 관련 질문이나 의견을 남겨주세요"></textarea>
          <button class="btn-f" onclick="submitComment()">코멘트 전송</button>
        </div>
      </div>
    </div>

    <!-- 예약 -->
    <div class="panel" id="p-booking">
      <div class="sec">
        <div style="background:var(--gp);border-radius:14px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;">
          <span style="font-size:18px;">🧘</span>
          <div><div style="font-size:11px;color:var(--g2);font-weight:600;">내 수강 클래스</div><div style="font-size:14px;font-weight:700;" id="myClassLbl"></div></div>
        </div>
        <div class="sec-t">수업 일정</div>
        <div id="bookingList"></div>
      </div>
    </div>

    <!-- 근육 활성도 -->
    <div class="panel" id="p-muscle">
      <div class="sec">
        <div class="sec-t">주별 근육 활성도</div>
        <div class="week-chart">
          <div style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:8px;">이번 주 출석</div>
          <div class="wc-bars" id="weekBars"></div>
          <div style="display:flex;gap:6px;" id="weekLabels"></div>
        </div>
        <div class="muscle-wrap" id="muscleWrap">
          <div>
            <div style="font-size:11px;text-align:center;color:var(--mid);margin-bottom:8px;">앞면</div>
            <svg width="110" height="220" viewBox="0 0 110 220" id="bodyFront">
              <!-- 머리 -->
              <ellipse cx="55" cy="22" rx="18" ry="20" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5"/>
              <!-- 몸통 -->
              <rect x="32" y="44" width="46" height="60" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-chest" class="muscle-part" onclick="highlightMuscle('chest')" data-name="가슴"/>
              <!-- 복부 -->
              <rect x="35" y="100" width="40" height="40" rx="6" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-core" class="muscle-part" onclick="highlightMuscle('core')" data-name="코어"/>
              <!-- 왼팔 -->
              <rect x="10" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-arm-l" class="muscle-part" onclick="highlightMuscle('arm')" data-name="팔"/>
              <!-- 오른팔 -->
              <rect x="80" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-arm-r" class="muscle-part" onclick="highlightMuscle('arm')" data-name="팔"/>
              <!-- 왼다리 -->
              <rect x="33" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-leg-l" class="muscle-part" onclick="highlightMuscle('leg')" data-name="다리"/>
              <!-- 오른다리 -->
              <rect x="57" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="f-leg-r" class="muscle-part" onclick="highlightMuscle('leg')" data-name="다리"/>
            </svg>
          </div>
          <div>
            <div style="font-size:11px;text-align:center;color:var(--mid);margin-bottom:8px;">뒷면</div>
            <svg width="110" height="220" viewBox="0 0 110 220" id="bodyBack">
              <ellipse cx="55" cy="22" rx="18" ry="20" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5"/>
              <rect x="32" y="44" width="46" height="60" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-back" class="muscle-part" onclick="highlightMuscle('back')" data-name="등"/>
              <rect x="35" y="100" width="40" height="40" rx="6" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-glute" class="muscle-part" onclick="highlightMuscle('glute')" data-name="둔근"/>
              <rect x="10" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-arm-l" class="muscle-part" onclick="highlightMuscle('arm')" data-name="팔"/>
              <rect x="80" y="46" width="20" height="55" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-arm-r" class="muscle-part" onclick="highlightMuscle('arm')" data-name="팔"/>
              <rect x="33" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-leg-l" class="muscle-part" onclick="highlightMuscle('leg')" data-name="다리"/>
              <rect x="57" y="142" width="20" height="70" rx="8" fill="#E8E4DC" stroke="#C8C0B0" stroke-width="1.5" id="b-leg-r" class="muscle-part" onclick="highlightMuscle('leg')" data-name="다리"/>
            </svg>
          </div>
        </div>
        <div class="muscle-legend">
          <div class="ml-item"><div class="ml-dot" style="background:#E8E4DC;border:1px solid #C8C0B0;"></div>미사용</div>
          <div class="ml-item"><div class="ml-dot" style="background:#A8D4B0;"></div>약한 활성</div>
          <div class="ml-item"><div class="ml-dot" style="background:#2A7A5A;"></div>강한 활성</div>
        </div>
        <div id="muscleInfo" style="background:var(--white);border-radius:var(--r);padding:14px;box-shadow:0 2px 10px var(--shadow);font-size:13px;color:var(--mid);">부위를 클릭하면 운동 정보가 표시됩니다.</div>
      </div>
    </div>

    <!-- 식단 -->
    <div class="panel" id="p-diet">
      <div class="sec">
        <div class="sec-t">내 식단 기록</div>
        <div class="diet-upload">
          <div style="font-size:13px;font-weight:600;margin-bottom:10px;">오늘 식단 업로드</div>
          <label class="upload-area" for="dietFile">
            <div style="font-size:32px;margin-bottom:8px;">📷</div>
            <div style="font-size:13px;font-weight:600;color:var(--g2);">사진 선택하기</div>
            <div style="font-size:11px;color:var(--mid);margin-top:4px;">강사가 칼로리 분석 및 코멘트를 남겨드려요</div>
          </label>
          <input type="file" id="dietFile" accept="image/*" style="display:none;" onchange="handleDietUpload(event)">
          <div id="dietPreview" style="margin-top:10px;"></div>
          <button class="btn-f" id="dietSubmitBtn" style="display:none;" onclick="submitDiet()">식단 업로드</button>
        </div>
        <div class="sec-t" style="margin-top:4px;">식단 기록</div>

async function startApp(){

  mData.name=name; mData.class=document.getElementById('inputClass').value; mData.bookings=mData.bookings||[];

  const snap = await getDocs(query(collection(db,'members'),where('name','==',name)));

function initApp(){
  document.getElementById('onboardScreen').style.display='none';

  document.getElementById('myClassLbl').textContent=mData.class;
  memberId = mData.memberId||null;
  renderHome(); renderHt('beginner');
}

function switchTab(t){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('p-'+t).classList.add('active');
  document.getElementById('t-'+t).classList.add('active');
  if(t==='home')renderHome();
  else if(t==='feedback')renderFbFull();
  else if(t==='comment')renderComments();
  else if(t==='booking')renderBooking();
  else if(t==='muscle')renderMuscle();
  else if(t==='diet')renderDietHistory();
  else if(t==='column')renderColumns();
}

async function getFbs(){
  if(!memberId)return[];
  const snap=await getDocs(query(collection(db,'feedbacks'),where('memberId','==',memberId),orderBy('date','desc')));
  return snap.docs.map(d=>d.data());
}

function renderFbCard(fb,preview=false){
  const note=preview?fb.note.slice(0,70)+(fb.note.length>70?'...':''):fb.note;
  return`<div class="fb-card">
    <div class="fb-top"><span class="fb-date">${fb.date}</span><span style="font-size:11px;color:var(--mid);">뉴런필라테스 강사</span></div>
    <div style="font-size:13px;margin-bottom:6px;">${'⭐'.repeat(fb.rating||0)}${'☆'.repeat(5-(fb.rating||0))}</div>
    <div style="font-size:14px;font-weight:600;margin-bottom:7px;">${fb.condition||''}</div>
    <div class="chip-row">${(fb.parts||[]).map(p=>`<span class="chip cb">${p}</span>`).join('')}</div>
    <div class="fb-note">${note}</div>
    ${fb.next?`<div class="fb-next">→ 다음 수업: ${fb.next}</div>`:''}
  </div>`;
}

  saveLocal();renderBooking();
}

  core:{name:'코어·복근',color:'#2A7A5A',desc:'코어는 거의 모든 필라테스 동작의 중심입니다. 헌드레드, 롤업, 크리스크로스에서 집중 사용됩니다.',exercises:['헌드레드','롤업','크리스크로스','티저']},
  back:{name:'등·척추',color:'#C4A055',desc:'척추 강화와 자세 교정의 핵심 부위입니다. 스완, 수영, 싱글레그킥에서 활성화됩니다.',exercises:['스완','수영','싱글레그킥']},
  glute:{name:'둔근·골반',color:'#D9634E',desc:'골반 안정성과 하체 균형의 핵심입니다. 브릿지, 사이드킥 시리즈에서 집중 사용됩니다.',exercises:['브릿지','사이드킥','레그풀']},
  arm:{name:'팔·상완',color:'#7B68EE',desc:'팔은 지지 동작과 밸런스 훈련에서 활성화됩니다.',exercises:['플랭크','푸쉬업 변형','사이드 플랭크']},
  leg:{name:'다리·햄스트링',color:'#FF8C00',desc:'하체 강화와 유연성 증가의 핵심 부위입니다. 레그서클, 싱글레그스트레치에서 활성화됩니다.',exercises:['레그서클','싱글레그스트레치','레그풀']}
};
let activeMuscle=null;

async function renderMuscle(){
  // 이번 주 출석 기반 차트
  const weekDays=['월','화','수','목','금','토','일'];
  const bars=weekDays.map((d,i)=>`
    <div class="wc-bar-wrap">
      <div class="wc-bar ${i===today.getDay()-1?'active':''}" style="height:${20+Math.random()*50}px;"></div>
      <div class="wc-label">${d}</div>
    </div>`).join('');
  document.getElementById('weekBars').innerHTML=bars;

  // 최근 피드백에서 집중 부위 파악
  const fbs=await getFbs();
  const partCount={};
  fbs.slice(0,5).forEach(fb=>(fb.parts||[]).forEach(p=>{partCount[p]=(partCount[p]||0)+1;}));
  updateMuscleColors(partCount);
}

function updateMuscleColors(partCount){
  const map={'코어':'core','허리':'back','어깨':'chest','고관절':'glute','다리':'leg','전신':'core'};
  const max=Math.max(...Object.values(partCount),1);
  Object.entries(partCount).forEach(([part,cnt])=>{
    const key=map[part];if(!key)return;
    const intensity=cnt/max;
    const color=intensity>0.6?muscleInfo[key]?.color:'#A8D4B0';
    [`f-${key==='core'?'core':key==='back'?'chest':key}`,`b-${key==='back'?'back':key==='glute'?'glute':key}`].forEach(id=>{
      const el=document.getElementById(id);if(el)el.style.fill=color;
    });
  });
}

window.highlightMuscle=function(key){
  activeMuscle=key;
  const info=muscleInfo[key];if(!info)return;
  document.getElementById('muscleInfo').innerHTML=`
    <div style="font-size:13px;font-weight:700;color:var(--stone);margin-bottom:6px;">💪 ${info.name}</div>
    <div style="font-size:12px;line-height:1.7;margin-bottom:10px;">${info.desc}</div>
    <div style="font-size:11px;font-weight:600;color:var(--mid);margin-bottom:5px;">관련 운동</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">${info.exercises.map(e=>`<span class="tag-g">${e}</span>`).join('')}</div>`;
};

// 식단
function handleDietUpload(e){
  const file=e.target.files[0];if(!file)return;
  dietFileData=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('dietPreview').innerHTML=`<img src="${ev.target.result}" style="width:100%;border-radius:10px;max-height:200px;object-fit:cover;margin-bottom:8px;">`;
    document.getElementById('dietSubmitBtn').style.display='block';
  };
  reader.readAsDataURL(file);
}

async function submitDiet(){
  if(!dietFileData){showToast('사진을 선택해 주세요');return;}
  showToast('업로드 중...');
  try {
    const storageRef=ref(storage,`diets/${mData.name}_${todayKey}_${Date.now()}`);
    await uploadBytes(storageRef,dietFileData);
    const url=await getDownloadURL(storageRef);
    await addDoc(collection(db,'diets'),{
      memberName:mData.name, memberId:memberId||'', date:todayKey,
      imageUrl:url, status:'pending', createdAt:new Date().toISOString()
    });
    document.getElementById('dietPreview').innerHTML='';
    document.getElementById('dietSubmitBtn').style.display='none';
    document.getElementById('dietFile').value='';
    dietFileData=null;
    renderDietHistory();
    showToast('식단 업로드 완료! 강사 코멘트를 기다려 주세요 🌿');
  } catch(e) {
    showToast('업로드 실패. Storage 설정을 확인해 주세요.');
  }
}

async function deleteDiet(id, imageUrl) {
  if(!confirm('이 식단 기록을 삭제하시겠습니까?'))return;
  try {
    if(imageUrl) {
      const imgRef = ref(storage, imageUrl);
      await deleteObject(imgRef).catch(()=>{});
    }
    await deleteDoc(doc(db,'diets',id));
    renderDietHistory();
    showToast('식단 기록이 삭제되었습니다');
  } catch(e) {
    showToast('삭제 중 오류가 발생했습니다');
  }
}

async function renderDietHistory(){
  const snap=await getDocs(query(collection(db,'diets'),where('memberName','==',mData.name),orderBy('date','desc')));
  const container=document.getElementById('dietHistoryList');
  if(snap.empty){container.innerHTML='<div style="font-size:12px;color:var(--mid);">아직 업로드한 식단이 없습니다</div>';return;}
  container.innerHTML='';
  snap.docs.forEach(d=>{
    const dt=d.data();
    const card=document.createElement('div');
    card.className='diet-history';
    card.innerHTML=`
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:12px;font-weight:600;">${dt.date}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:10px;padding:2px 8px;border-radius:8px;${dt.status==='done'?'background:var(--gp);color:var(--g2)':'background:#FFF3E0;color:#D07030;'}">${dt.status==='done'?'코멘트 완료':'대기중'}</span>
          <button class="del-diet-btn" style="padding:3px 10px;background:#FDECEA;color:var(--red);border:none;border-radius:8px;font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;">삭제</button>
        </div>
      </div>
      ${dt.imageUrl?`<img class="diet-img" src="${dt.imageUrl}" alt="식단">`:''}
      ${dt.kcal?`<div style="font-size:12px;color:var(--g2);font-weight:600;margin-bottom:5px;">예상 칼로리: ${dt.kcal} kcal</div>`:''}
      ${dt.comment?`<div style="font-size:12px;line-height:1.6;margin-bottom:6px;">${dt.comment}</div>`:''}
      ${dt.suggest?`<div style="font-size:11px;color:var(--g2);">→ ${dt.suggest}</div>`:''}`;
    card.querySelector('.del-diet-btn').addEventListener('click',()=>deleteDiet(d.id, dt.imageUrl||''));
    container.appendChild(card);
  });
}

// 칼럼
async function renderColumns(){
  const snap=await getDocs(query(collection(db,'columns'),orderBy('createdAt','desc')));
  document.getElementById('colList').innerHTML=snap.empty?'<div class="empty"><div style="font-size:40px;">📖</div><div style="font-size:13px;margin-top:8px;">등록된 칼럼이 없습니다</div></div>':
    snap.docs.map(d=>{
      const dt=d.data();
      return`<div class="col-card" onclick="openColDetail('${d.id}','${encodeURIComponent(dt.title)}','${encodeURIComponent(dt.content)}','${dt.category}')">
        <span class="col-tag-badge">${dt.category}</span>
        <div style="font-size:14px;font-weight:700;margin-bottom:5px;">${dt.title}</div>
        <div style="font-size:12px;color:var(--mid);line-height:1.5;">${dt.content.slice(0,60)}...</div>
      </div>`;
    }).join('');
}

window.openColDetail=function(id,title,content,cat){
  document.getElementById('colMT').textContent=decodeURIComponent(title);
  document.getElementById('colMB').innerHTML=`<div style="margin-bottom:8px;"><span class="col-tag-badge">${cat}</span></div><div style="white-space:pre-wrap;">${decodeURIComponent(content)}</div>`;
  openModal('colModal');
};

function selHtCat(cat,el){
  document.querySelectorAll('.ht-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderHt(cat);
}

function renderHt(cat){
  document.getElementById('htList').innerHTML=(htData[cat]||[]).map((ex,i)=>`
    <div class="ht-card" onclick="openHtModal(${i},'${cat}')">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
        <span style="font-size:32px;">${ex.emoji}</span>
        <div><div style="font-size:13px;font-weight:700;">${ex.title}</div><div style="font-size:11px;color:var(--mid);margin-top:2px;">${ex.desc.slice(0,35)}...</div></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;">
        ${ex.tags.map(t=>`<span class="tag-g">${t}</span>`).join('')}
        <span class="tag-t">⏱ ${ex.time}</span>
        <span class="tag-l">${ex.level}</span>
      </div>
    </div>`).join('');
}

window.openHtModal=function(i,cat){
  const ex=htData[cat][i];
  document.getElementById('htMT').textContent=ex.emoji+' '+ex.title;
  document.getElementById('htMB').innerHTML=`
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;">
      ${ex.tags.map(t=>`<span class="tag-g">${t}</span>`).join('')}
      <span class="tag-t">⏱ ${ex.time}</span>
      <span class="tag-l">${ex.level}</span>
    </div>
    <p style="font-size:13px;color:var(--mid);line-height:1.7;margin-bottom:12px;">${ex.desc}</p>
    <div style="font-size:11px;font-weight:700;color:var(--mid);margin-bottom:8px;">운동 방법</div>
    <div style="font-size:13px;line-height:2;">${ex.steps.join('<br>')}</div>
    <button class="btn-f" style="margin-top:14px;" onclick="closeModal('htModal');switchTab('hometraining');toggleTimer();">▶ 타이머 시작</button>`;
  openModal('htModal');
};

function toggleTimer(){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLbl').textContent='일시정지됨';}
  else{timerRunning=true;document.getElementById('timerBtn').textContent='⏸ 정지';document.getElementById('timerLbl').textContent='운동 중 🔥';
    timerInterval=setInterval(()=>{timerSecs++;const m=Math.floor(timerSecs/60),s=timerSecs%60;document.getElementById('timerD').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');},1000);}
}
function resetTimer(){clearInterval(timerInterval);timerRunning=false;timerSecs=0;document.getElementById('timerD').textContent='00:00';document.getElementById('timerBtn').textContent='▶ 시작';document.getElementById('timerLbl').textContent='운동 타이머';}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

if(mData.name)initApp();
</script>
